// Two-line chart: current year + previous year for the same lote.
function renderNDVIChartMultiYear(curveCurrent, curvePrior) {
  const w = 600, h = 200, padL = 44, padR = 16, padT = 16, padB = 32;
  const innerW = w - padL - padR;
  const innerH = h - padT - padB;
  const xAt = (i) => padL + (i / 11) * innerW;
  const yAt = (v) => padT + innerH - (v / 1.0) * innerH;

  const path = (curve, dashed) => {
    const d = curve.map((v, i) => `${i === 0 ? 'M' : 'L'} ${xAt(i).toFixed(1)},${yAt(v).toFixed(1)}`).join(' ');
    return `<path d="${d}" fill="none" stroke="${dashed ? '#5A6270' : '#2E5BFF'}" stroke-width="${dashed ? 1.8 : 2.5}" ${dashed ? 'stroke-dasharray="5 4"' : ''}/>`;
  };

  const months = ['M1','M2','M3','M4','M5','M6','M7','M8','M9','M10','M11','M12'];
  const xLabels = months.map((m, i) => `<text x="${xAt(i).toFixed(1)}" y="${h - 10}" text-anchor="middle" font-size="9" fill="#5A6270">${m}</text>`).join('');
  const yTicks  = [0, 0.25, 0.5, 0.75, 1.0];
  const yLabels = yTicks.map(v => `<text x="${padL - 6}" y="${(yAt(v) + 3).toFixed(1)}" text-anchor="end" font-size="9" fill="#5A6270">${v.toFixed(2)}</text>`).join('');
  const grid    = yTicks.slice(1).map(v => `<line x1="${padL}" y1="${yAt(v).toFixed(1)}" x2="${w - padR}" y2="${yAt(v).toFixed(1)}" stroke="#EAECEF" stroke-width="1"/>`).join('');

  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">
    ${grid}
    ${path(curvePrior, true)}
    ${path(curveCurrent, false)}
    ${xLabels}
    ${yLabels}
  </svg>`;
}

// Sparkline: 12 monthly compliance-score points (0-100).
function renderScoreSparkline(series, currentScore) {
  const w = 600, h = 70, padL = 30, padR = 10, padT = 8, padB = 18;
  const innerW = w - padL - padR;
  const innerH = h - padT - padB;
  const xAt = (i) => padL + (i / (series.length - 1)) * innerW;
  const yAt = (v) => padT + innerH - (v / 100) * innerH;

  const linePath = series.map((v, i) => `${i === 0 ? 'M' : 'L'} ${xAt(i).toFixed(1)},${yAt(v).toFixed(1)}`).join(' ');
  // Area under line (subtle fill).
  const areaPath = linePath + ` L ${xAt(series.length - 1).toFixed(1)},${yAt(0).toFixed(1)} L ${xAt(0).toFixed(1)},${yAt(0).toFixed(1)} Z`;

  // Threshold lines at 60 (warn) and 80 (good).
  const thresholdLines = [
    { v: 80, color: '#0EA471', label: '80 (ok)' },
    { v: 60, color: '#C77400', label: '60' },
  ].map(t => `
    <line x1="${padL}" y1="${yAt(t.v).toFixed(1)}" x2="${w - padR}" y2="${yAt(t.v).toFixed(1)}" stroke="${t.color}" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
  `).join('');

  // Final dot.
  const finalDot = `<circle cx="${xAt(series.length - 1).toFixed(1)}" cy="${yAt(currentScore).toFixed(1)}" r="4" fill="#2E5BFF" stroke="white" stroke-width="2"/>`;

  // Y-axis labels.
  const yLabels = [0, 50, 100].map(v => `<text x="${padL - 4}" y="${(yAt(v) + 3).toFixed(1)}" text-anchor="end" font-size="9" fill="#8A93A0" font-family="ui-monospace,monospace">${v}</text>`).join('');

  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">
    ${thresholdLines}
    <path d="${areaPath}" fill="#2E5BFF" opacity="0.08"/>
    <path d="${linePath}" fill="none" stroke="#2E5BFF" stroke-width="2"/>
    ${finalDot}
    ${yLabels}
  </svg>`;
}

// Generate score history (12 monthly points ending in current score).
function synthScoreSeries(currentScore, riskLevel) {
  // riskLevel: 'high' (breach), 'medium' (watch), 'low' (ok)
  const seed = currentScore * 31 + (riskLevel === 'high' ? 1 : riskLevel === 'medium' ? 2 : 3);
  let s = seed >>> 0;
  const rng = () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296; };

  const series = [];
  if (riskLevel === 'high') {
    // Started high (~85), dropped sharply in last 4 months
    let v = 85 + (rng() - 0.5) * 6;
    for (let i = 0; i < 8; i++) {
      v += (rng() - 0.5) * 4;  // small fluctuation
      series.push(Math.round(Math.max(0, Math.min(100, v))));
    }
    // Last 4 months: aggressive drop ending at currentScore.
    const start = series[series.length - 1];
    for (let i = 0; i < 4; i++) {
      const t = (i + 1) / 4;
      v = start + (currentScore - start) * t + (rng() - 0.5) * 3;
      series.push(Math.round(Math.max(0, Math.min(100, v))));
    }
  } else if (riskLevel === 'medium') {
    // Slow drift down from ~80 to current
    let v = 80 + (rng() - 0.5) * 4;
    for (let i = 0; i < 11; i++) {
      const t = (i + 1) / 12;
      v = 80 + (currentScore - 80) * t + (rng() - 0.5) * 4;
      series.push(Math.round(Math.max(0, Math.min(100, v))));
    }
    series.push(currentScore);
  } else {
    // Stable around currentScore ±5
    for (let i = 0; i < 11; i++) {
      const v = currentScore + (rng() - 0.5) * 8;
      series.push(Math.round(Math.max(0, Math.min(100, v))));
    }
    series.push(currentScore);
  }
  // Always anchor the last point to currentScore so the line ends where the
  // big number says it ends (avoids ±1 visual drift from noise).
  if (series.length > 0) series[series.length - 1] = currentScore;
  return series;
}

// Generate event timeline (8-12 events, last 12 months) for a CAR.
// Mix of: alert triggered, alert resolved, manual review, doc submission,
// status change, Sentinel-2 sweep (live predios only).
function synthEventTimeline(d, lang, isLive, riskLevel) {
  let s = 0;
  for (let i = 0; i < d.car.length; i++) s = (s * 31 + d.car.charCodeAt(i)) >>> 0;
  const rng = () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296; };
  const pick = (arr) => arr[Math.floor(rng() * arr.length)];

  const today = new Date('2026-05-05');
  const dateOffset = (daysAgo) => {
    const dt = new Date(today);
    dt.setDate(dt.getDate() - daysAgo);
    return dt.toISOString().slice(0, 10);
  };

  const T = (pt, es, en) => lang === 'pt' ? pt : (lang === 'es' ? es : en);
  const events = [];

  // --- Alerts (active and resolved) ---
  if (riskLevel === 'high') {
    // Active critical alert (last 5-15 days)
    events.push({
      date: dateOffset(5 + Math.floor(rng() * 10)), type: 'alert', sev: 'high',
      title: T('Alerta crítico — Desvio NDVI', 'Alerta crítica — Desvío NDVI', 'Critical alert — NDVI deviation'),
      desc:  T(`Lote ${d.lotes[0]?.id || 'L02'} apresenta desvio NDVI > 30% em relação à curva regional.`,
                `Lote ${d.lotes[0]?.id || 'L02'} presenta desvío NDVI > 30% respecto a la curva regional.`,
                `Plot ${d.lotes[0]?.id || 'L02'} shows NDVI deviation > 30% vs regional curve.`),
      status: 'active',
    });
    // 1-2 resolved alerts
    events.push({
      date: dateOffset(60 + Math.floor(rng() * 30)), type: 'alert', sev: 'medium',
      title: T('Foco de calor detectado', 'Foco de calor detectado', 'Heat anomaly detected'),
      desc:  T('Detecção MODIS de foco de calor no perímetro do imóvel — confirmado, queima controlada.',
                'Detección MODIS de foco de calor en el perímetro — confirmado, quema controlada.',
                'MODIS heat-anomaly detection on property perimeter — confirmed, controlled burn.'),
      status: 'resolved',
    });
  } else if (riskLevel === 'medium') {
    events.push({
      date: dateOffset(8 + Math.floor(rng() * 14)), type: 'alert', sev: 'medium',
      title: T('Alerta de observação — NDVI', 'Alerta de observación — NDVI', 'Watch alert — NDVI'),
      desc:  T('Desvio NDVI 15-25% — abaixo do limiar BACEN (30%) mas em monitoramento.',
                'Desvío NDVI 15-25% — bajo el umbral BCRA (30%) pero en seguimiento.',
                'NDVI deviation 15-25% — below regulatory threshold but under watch.'),
      status: 'active',
    });
  } else {
    // ok: 1 minor resolved alert
    events.push({
      date: dateOffset(110 + Math.floor(rng() * 30)), type: 'alert', sev: 'low',
      title: T('Sobreposição menor revisada', 'Solapamiento menor revisado', 'Minor overlap reviewed'),
      desc:  T('Sobreposição < 0.5 ha com CAR vizinho — resolvido após retificação cartorial.',
                'Solapamiento < 0.5 ha con vecino — resuelto tras rectificación registral.',
                'Overlap < 0.5 ha with neighbor — resolved after registry update.'),
      status: 'resolved',
    });
  }

  // --- Status change (only if currently watch or breach) ---
  if (riskLevel !== 'low') {
    const fromState = riskLevel === 'high' ? T('Observação','Observación','Watch') : T('Conforme','Conforme','Compliant');
    const toState   = riskLevel === 'high' ? T('Não conforme','No conforme','Non-compliant') : T('Observação','Observación','Watch');
    events.push({
      date: dateOffset(riskLevel === 'high' ? 20 + Math.floor(rng() * 10) : 35 + Math.floor(rng() * 20)),
      type: 'status', sev: 'medium',
      title: T(`Mudança de status: ${fromState} → ${toState}`, `Cambio de estado: ${fromState} → ${toState}`, `Status change: ${fromState} → ${toState}`),
      desc:  T('Score de compliance caiu abaixo do limiar — reclassificação automática.',
                'Score de cumplimiento cayó bajo umbral — reclasificación automática.',
                'Compliance score dropped below threshold — automatic reclassification.'),
    });
  }

  // --- Manual review ---
  events.push({
    date: dateOffset(45 + Math.floor(rng() * 60)), type: 'review', sev: 'info',
    title: T('Revisão manual do analista', 'Revisión manual del analista', 'Manual analyst review'),
    desc:  T(`Revisão de auditoria CMN 5.193 e validação documental. Concluída por ${pick(['Joaquín B.','Ana M.','Roberto S.'])}.`,
              `Revisión de auditoría regulatoria y validación documental. Concluida por ${pick(['Joaquín B.','Ana M.','Roberto S.'])}.`,
              `Audit review and document validation. Completed by ${pick(['Joaquín B.','Ana M.','Roberto S.'])}.`),
  });

  // --- Document submission ---
  events.push({
    date: dateOffset(80 + Math.floor(rng() * 80)), type: 'doc', sev: 'info',
    title: T('Documento atualizado: CCIR', 'Documento actualizado: CCIR', 'Document updated: cadastral certificate'),
    desc:  T('Renovação do CCIR (Certificado de Cadastro de Imóvel Rural) protocolada.',
              'Renovación del certificado catastral protocolada.',
              'Cadastral certificate renewal filed.'),
  });

  // --- Sentinel-2 sweeps (live predios only — show last 3) ---
  if (isLive) {
    for (let i = 0; i < 3; i++) {
      events.push({
        date: dateOffset(7 + i * 5 + Math.floor(rng() * 2)),
        type: 'sweep', sev: 'info',
        title: T('Varredura Sentinel-2 concluída', 'Barrido Sentinel-2 completado', 'Sentinel-2 sweep completed'),
        desc:  T(`Imagens L2A processadas. ${Math.floor(rng() * 18 + 5)}% cobertura nuvem. NDVI atualizado.`,
                  `Imágenes L2A procesadas. ${Math.floor(rng() * 18 + 5)}% cobertura nubosa. NDVI actualizado.`,
                  `L2A imagery processed. ${Math.floor(rng() * 18 + 5)}% cloud cover. NDVI refreshed.`),
      });
    }
  }

  // Sort newest first.
  events.sort((a, b) => b.date.localeCompare(a.date));
  return events;
}

function buildLaudoHTML(carId, lang, country) {
  const d = getCARDetail(carId);
  const flag = COUNTRY_LABELS[country].flag;
  const idLabel = COUNTRY_LABELS[country].id;
  const muniLabel = COUNTRY_LABELS[country].muni[lang] || COUNTRY_LABELS[country].muni.es;
  const ufLabel   = COUNTRY_LABELS[country].uf[lang] || COUNTRY_LABELS[country].uf.es;

  // Inline localization for laudo-specific strings.
  const T = (pt, es, en) => lang === 'pt' ? pt : (lang === 'es' ? es : en);
  const fmtN = (n) => n.toLocaleString(lang === 'en' ? 'en-US' : 'pt-BR');

  const reg2country = {
    BR: 'CMN 5.193/2024 · CMN 5.267/2024 · CMN 4.902/2021',
    AR: 'BCRA Com. A 7724 · SENASA Res. 423/2014 · Ley 26.331 (Bosques)',
    PY: 'INFONA Ley 422/73 · SENAVE Ley 4799 · BCP Reg. crédito agropecuario',
  };
  const regFooter = reg2country[country];

  const cropName = (c) => {
    const map = { soja: T('Soja','Soja','Soy'), milho: T('Milho','Maíz','Corn'),
                  pastagem: T('Pastagem','Pasturas','Pasture'), trigo: T('Trigo','Trigo','Wheat'),
                  algodao: T('Algodão','Algodón','Cotton') };
    return map[c] || c;
  };

  const conformBadge = (ok) => ok
    ? `<span class="laudo-badge ok">✓ ${T('CONFORME','CONFORME','COMPLIANT')}</span>`
    : `<span class="laudo-badge bad">✗ ${T('NÃO CONFORME','NO CONFORME','NON-COMPLIANT')}</span>`;
  const loteStatusBadge = (s) => {
    if (s === 'healthy')  return `<span class="laudo-badge ok">${T('Saudável','Saludable','Healthy')}</span>`;
    if (s === 'watch')    return `<span class="laudo-badge warn">${T('Observação','Observación','Watch')}</span>`;
    return `<span class="laudo-badge bad">${T('Alerta Crítico','Alerta Crítica','Critical Alert')}</span>`;
  };
  const regStatusBadge = (s) => {
    const map = { ativo: T('Ativo','Activo','Active'), pendente: T('Pendente','Pendiente','Pending'),
                  suspenso: T('Suspenso','Suspendido','Suspended'), cancelado: T('Cancelado','Cancelado','Cancelled') };
    const cls = s === 'ativo' ? 'ok' : (s === 'pendente' ? 'warn' : 'bad');
    return `<span class="laudo-badge ${cls}">${map[s] || s}</span>`;
  };

  // Group audit detail by category for the big tables.
  const catLabels = {
    reg:        T('1. Registro Cadastral','1. Registro Catastral','1. Registry'),
    social:     T('2. Variáveis Sociais','2. Variables Sociales','2. Social Variables'),
    protected:  T('3. Áreas Protegidas','3. Áreas Protegidas','3. Protected Areas'),
    embargo:    T('4. Embargos Ambientais','4. Embargos Ambientales','4. Environmental Embargoes'),
    vegetation: T('5. Vegetação Nativa','5. Vegetación Nativa','5. Native Vegetation'),
    general:    T('6. Vedações Gerais','6. Restricciones Generales','6. General Restrictions'),
    sensing:    T('7. Sensoriamento Remoto','7. Teledetección','7. Remote Sensing'),
  };

  const auditByCat = {};
  for (const a of d.auditDetail) {
    if (!auditByCat[a.cat]) auditByCat[a.cat] = [];
    auditByCat[a.cat].push(a);
  }

  const renderAuditCat = (catKey) => {
    const items = auditByCat[catKey] || [];
    if (!items.length) return '';
    return items.map(a => `
      <tr>
        <td class="cat">${catLabels[catKey]}</td>
        <td class="varN">${a.varN[lang] || a.varN.es}</td>
        <td>${a.desc[lang] || a.desc.es}</td>
        <td>${a.ev[lang] || a.ev.es}</td>
        <td class="src">${a.src}</td>
        <td class="mcr">${a.mcr}</td>
        <td>${a.conformant
          ? `<span class="laudo-badge ok">✓</span>`
          : `<span class="laudo-badge bad">✗</span>`}</td>
      </tr>`).join('');
  };

  // Critical lote = the one with worst |deviation|.
  const criticalLote = d.lotes.slice().sort((a, b) => Math.abs(b.deviation) - Math.abs(a.deviation))[0];

  // The laudo opens in a new window via window.open(''), which lands on
  // about:blank. Without a <base href>, relative URLs like "logo.png" cannot
  // resolve. We capture the parent's origin and inject it as <base href>.
  const ORIGIN = (typeof window !== 'undefined' && window.location && window.location.origin) ? window.location.origin : '';

  return `<!DOCTYPE html>

// =====================================================================
// NOTIFICATIONS — recent alerts cross-country (top breach predios from
// each country, mixed and sorted by severity/recency).
// =====================================================================
function getRecentNotifications() {
  // Synthetic dates for the last ~14 days, deterministic.
  const dateOffset = (i) => {
    const d = new Date('2026-05-04');
    d.setDate(d.getDate() - i);
    return d.toISOString().slice(0, 10);
  };

  // Pull breach predios per country, take top by risk, take their first alert.
  const items = [];
  // Per-country picks: 3 from BR, 3 from AR, 2 from PY.
  const picks = { BR: 3, AR: 3, PY: 2 };
  for (const c of Object.keys(picks)) {
    const top = DATASETS[c].props
      .filter(p => p.status === 'breach')
      .sort((a, b) => (b.risk || 0) - (a.risk || 0))
      .slice(0, picks[c]);
    for (const p of top) {
      // Use synthesized detail for alert info — but keep state.country safe.
      const savedCountry = state.country;
      // Temporarily switch PROPS so getCARDetail finds the predio.
      const savedProps = PROPS;
      PROPS = DATASETS[c].props;
      const det = getCARDetail(p.car);
      PROPS = savedProps;
      // Pick the first high-severity alert if any, otherwise the first alert.
      const a = (det.alertList || []).sort((x, y) =>
        (y.sev === 'high' ? 2 : y.sev === 'medium' ? 1 : 0) -
        (x.sev === 'high' ? 2 : x.sev === 'medium' ? 1 : 0)
      )[0] || { id: 'A-' + p.car.slice(-4), kind: 'overlap', sev: 'medium', area: 0, conf: 0, sat: '', date: dateOffset(items.length) };
      items.push({
        country: c, car: p.car, owner: p.owner, muni: p.muni, uf: p.uf,
        alertKind: a.kind, alertSev: a.sev, alertId: a.id,
        alertArea: a.area, alertDate: a.date,
      });
    }
  }
  // Sort: high severity first, then by date desc.
  items.sort((a, b) => {
    const sevRank = (s) => s === 'high' ? 2 : s === 'medium' ? 1 : 0;
    const ds = sevRank(b.alertSev) - sevRank(a.alertSev);
    if (ds !== 0) return ds;
    return b.alertDate.localeCompare(a.alertDate);
  });
  return items;
}

  int: (n) => n.toLocaleString(state.lang === 'en' ? 'en-US' : 'pt-BR'),
  ha:  (n) => fmt.int(n) + ' ha',
  pct: (n) => (typeof n === 'number' ? n.toFixed(1) : n) + '%',
};

// Compact BRL: B (>=1bn), MM (>=1m), K (>=1k), raw otherwise.
function fmtBRL(n) {
  if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'MM';
  if (n >= 1e3) return (n / 1e3).toFixed(0) + 'K';
  return Math.round(n).toString();
}

// avatar color from string
function avColor(s) {
  const palette = ['#2E5BFF','#6B47DC','#0EA471','#C77400','#0D7FBF','#D63A3A'];
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return palette[h % palette.length];
}
function initials(s) {
  return s.split(/\s+/).filter(Boolean).slice(0, 2).map(p => p[0]).join('').toUpperCase();
}

// RENDER ROUTER
// ===========================================================================
// Tracks the last "view key" we rendered. When the key changes (different
// module / country / different CAR), we reset scroll. When it's the same
// (filter toggled, language switched, etc.) we preserve scroll position.
let _lastViewKey = null;

function render() {
  // sidebar / lang active states
  $$('.side-item').forEach(b => b.classList.toggle('active', b.dataset.mod === state.module));
  $$('#lang button').forEach(b => b.classList.toggle('active', b.dataset.l === state.lang));
  // Mobile lang select: keep in sync with state.lang
  const lm = $('#lang-mobile');
  if (lm && lm.value !== state.lang) lm.value = state.lang;

  // country tabs: active state + per-country count badge
  $$('.country-tab').forEach(b => {
    const isActive = b.dataset.country === state.country;
    b.classList.toggle('active', isActive);
    // On mobile, auto-scroll the active tab into view (smooth, no horizontal jump).
    if (isActive && window.matchMedia('(max-width: 1023px)').matches) {
      try { b.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' }); } catch (_) {}
    }
  });
  $$('[data-ct]').forEach(el => {
    const c = el.dataset.ct;
    el.textContent = (DATASETS[c].displayTotal || DATASETS[c].props.length).toLocaleString(state.lang === 'en' ? 'en-US' : 'es-AR');
  });

  // Notification badge: total count from all 3 countries.
  const notifCount = getRecentNotifications().length;
  const badge = $('#notif-badge');
  if (badge) badge.textContent = notifCount;
  // If the dropdown is open during a re-render (e.g. language switch),
  // refresh its content so labels stay in sync.
  const dd = $('#notif-dropdown');
  if (dd && !dd.hidden) openNotifDropdown();

  // sidebar labels
  $('#t-modules').textContent = T().modules;
  $('#t-panel').textContent = T().panel;
  $('#t-scanner').textContent = T().scanner;
  $('#t-monitor').textContent = T().monitor;

  const main = $('#main');
  // Preserve scroll on minor re-renders (filter, language, expand checkpoint).
  // Reset scroll only when the user navigates to a different "page".
  const viewKey = `${state.country}|${state.module}|${state.scannerView}|${state.scannerCar || ''}|${state.lastConsultedCar || ''}|${state.carSubtab}`;
  const prevScroll = main.scrollTop;
  const isNavigation = _lastViewKey !== null && _lastViewKey.split('|').slice(0, 4).join('|') !== viewKey.split('|').slice(0, 4).join('|');

  // Fade-in only on real navigation (not on filter toggle).
  if (isNavigation) main.classList.add('view-enter');

  if (state.module === 'panel') main.innerHTML = localize(`<div class="container">${renderPanel()}</div>`);
  else if (state.module === 'scanner') main.innerHTML = localize(`<div class="container">${renderScanner()}</div>`);
  else if (state.module === 'monitor') main.innerHTML = localize(`<div class="container">${renderMonitor()}</div>`);

  // Scroll: keep if minor change, reset if real navigation.
  if (isNavigation) {
    main.scrollTop = 0;
    requestAnimationFrame(() => main.classList.remove('view-enter'));
  } else {
    main.scrollTop = prevScroll;
  }
  _lastViewKey = viewKey;

  // Sync URL hash so the back button + deep-linking work.
  syncHashFromState();

  attachHandlers();
}

// =====================================================================
// Hash routing — URL like #BR/panel, #AR/scanner/CAR_ID, #PY/monitor.
// Lets the browser back button work and lets users share/bookmark.
// =====================================================================
function syncHashFromState() {
  let parts = [state.country, state.module];
  if (state.module === 'scanner' && state.scannerView === 'car' && state.scannerCar) {
    parts.push(state.scannerCar);
  }
  const newHash = '#' + parts.join('/');
  if (location.hash !== newHash) {
    history.replaceState(null, '', newHash);
  }
}

function applyHash() {
  const raw = location.hash.replace(/^#/, '');
  if (!raw) return false;
  const parts = raw.split('/');
  const country = parts[0];
  if (!DATASETS[country]) return false;
  if (state.country !== country) setCountry(country);
  if (parts[1] && ['panel', 'scanner', 'monitor'].includes(parts[1])) state.module = parts[1];
  if (parts[2]) {
    state.scannerCar = parts[2];
    state.lastConsultedCar = parts[2];
    state.scannerView = 'car';
  }
  return true;
}

// 27-state Brazil map. Each path is colored by region; opacity dims when a
// filter is active. Click on a state filters the table to that UF; click on
// the active state clears the filter. Hover shows a tooltip with stats.
function renderBrazilMap() {
  const reg = (id) => REGIONS.find(r => r.id === id);
  const dimFor = (uf) => {
    if (state.filterUf) return state.filterUf === uf ? 1 : 0.18;
    if (state.filterRegion === 'all') return 1;
    return MAP_DATA.states[uf].region === state.filterRegion ? 1 : 0.18;
  };
  const stroke = (uf) => state.filterUf === uf ? '#0A0B0D' : '#FFFFFF';
  const strokeW = (uf) => state.filterUf === uf ? 1.6 : 0.6;

  // Sort: render larger states first so smaller ones (DF, SE, AL, etc.)
  // sit on top with their labels visible.
  const ufs = Object.keys(MAP_DATA.states).sort((a, b) =>
    MAP_DATA.states[b].d.length - MAP_DATA.states[a].d.length
  );

  const paths = ufs.map(uf => {
    const s = MAP_DATA.states[uf];
    const r = reg(s.region);
    return `<path id="uf-${uf}" data-uf="${uf}" d="${s.d}"
              fill="${r.color}" opacity="${dimFor(uf)}"
              stroke="${stroke(uf)}" stroke-width="${strokeW(uf)}"
              style="cursor:pointer;transition:opacity 180ms,stroke-width 180ms"/>`;
  }).join('');

  // Labels: render after paths so they sit on top. Skip labels for tiny states
  // when nothing is highlighted (would be unreadable).
  const labels = ufs.map(uf => {
    const s = MAP_DATA.states[uf];
    return `<text x="${s.lx}" y="${s.ly}" text-anchor="middle"
              fill="#FFFFFF" font-size="14" font-weight="600"
              pointer-events="none"
              style="text-shadow:0 1px 2px rgba(0,0,0,0.45);font-family:var(--sans);">${uf}</text>`;
  }).join('');

  return `
    <div class="map-stage">
      <svg viewBox="${MAP_DATA.viewBox}" preserveAspectRatio="xMidYMid meet"
           style="width:100%;height:100%;display:block;">
        ${paths}
        ${labels}
      </svg>
      <div id="map-tip" class="map-tip" style="display:none"></div>
    </div>
  `;
}

function renderSparkBars() {
  const data = [12, 9, 22, 31, 18, 26, 41, 33, 28, 47, 39, 52];
  const max = Math.max(...data);
  const w = 320, h = 60;
  const bw = w / data.length - 4;
  const bars = data.map((v, i) =>
    `<rect x="${i * (bw + 4)}" y="${h - (v/max) * h}" width="${bw}" height="${(v/max) * h}" fill="#2E5BFF" rx="2" opacity="${0.4 + (v/max) * 0.6}"/>`
  ).join('');
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${bars}</svg>`;
}

          <button class="btn btn-accent" data-laudo="${d.car}"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>${t.laudo}</button>
        </div>
      </div>

      <div class="car-grid">
        <div class="car-cell-m"><div class="l">${t.hectares}</div><div class="v">${fmt.int(d.ha)} ha</div></div>
        <div class="car-cell-m"><div class="l">${t.agArea}</div><div class="v">${fmt.int(d.agHa)} ha</div><div class="s">${fmt.pct(d.agPct)}</div></div>
        <div class="car-cell-m"><div class="l">${t.unprodArea}</div><div class="v">${fmt.pct(d.unprodPct)}</div></div>
        <div class="car-cell-m"><div class="l">${t.muniUf}</div><div class="v sm">${d.muni}/${d.uf}</div></div>
        <div class="car-cell-m"><div class="l">${t.statusV}</div><div class="v"><span class="badge ok"><span class="bdot"></span>${t.activo}</span></div></div>
        <div class="car-cell-m"><div class="l">${t.tipo}</div><div class="v sm">${t.imovel}</div></div>
      </div>
    </div>

    <div class="audit-grid">
      ${[
        { code: 'CMN 5.193', name: state.lang === 'en' ? 'Socio-environmental risk' : (state.lang === 'es' ? 'Riesgo socioambiental' : 'Risco socioambiental'), desc: state.lang === 'en' ? 'For rural credit operations.' : (state.lang === 'es' ? 'Para operaciones de crédito rural.' : 'Para operações de crédito rural.'), s: d.audit.cmn5193 },
        { code: 'CMN 5.267', name: state.lang === 'en' ? 'Embargo restrictions' : (state.lang === 'es' ? 'Restricciones de embargos' : 'Restrições de embargos'), desc: state.lang === 'en' ? 'IBAMA embargoes on rural collateral.' : (state.lang === 'es' ? 'Embargos IBAMA sobre garantías.' : 'Embargos IBAMA sobre garantias.'), s: d.audit.cmn5267 },
        { code: 'CMN 4.902', name: state.lang === 'en' ? 'PROAGRO criteria' : (state.lang === 'es' ? 'Criterios PROAGRO' : 'Critérios PROAGRO'), desc: state.lang === 'en' ? 'Eligibility and seguro safra.' : (state.lang === 'es' ? 'Elegibilidad y seguro safra.' : 'Elegibilidade e seguro safra.'), s: d.audit.cmn4902 },
      ].map(a => `
        <div class="audit-cmn ${a.s === 'ok' ? 'ok' : 'bad'}">
          <div class="cmn-code">${a.code}</div>
          <div class="cmn-name">${a.name}</div>
          <div class="cmn-desc">${a.desc}</div>
          <span class="badge ${a.s === 'ok' ? 'ok' : 'breach'}"><span class="bdot"></span>${a.s === 'ok' ? t.confName : t.notConf}</span>
        </div>
      `).join('')}
    </div>

    <div class="subtab-bar">
      <button data-sub="audit" class="${state.carSubtab === 'audit' ? 'active' : ''}">${t.audit}</button>
      <button data-sub="monitoring" class="${state.carSubtab === 'monitoring' ? 'active' : ''}">${t.monitoring}</button>
    </div>

    ${renderCarSubtab(d)}
  `;
}

function renderCarSubtab(d) {
  const t = T();
  // Defensive: if state was loaded from a URL/cache with a removed subtab id
  // (geoms / overlap were removed in feedback-cleanup-1), normalize to 'audit'.
  if (state.carSubtab !== 'audit' && state.carSubtab !== 'monitoring') {
    state.carSubtab = 'audit';
  }
  if (state.carSubtab === 'audit') {
    const lblShow = state.lang === 'en' ? 'Show details' : (state.lang === 'es' ? 'Ver detalle' : 'Ver detalhe');
    const lblHide = state.lang === 'en' ? 'Hide details' : (state.lang === 'es' ? 'Ocultar detalle' : 'Ocultar detalhe');
    const lblWhat = state.lang === 'en' ? 'What is checked' : (state.lang === 'es' ? 'Qué se verifica' : 'O que é verificado');
    const lblResult = state.lang === 'en' ? 'Result' : (state.lang === 'es' ? 'Resultado' : 'Resultado');
    return d.checkpoints.map((c, i) => {
      const isOpen = state.openCheckpoints && state.openCheckpoints.has(i);
      return `
      <details class="checkpoint-acc ${c.ok ? 'ok' : 'bad'}" data-cp="${i}" ${isOpen ? 'open' : ''}>
        <summary>
          <div class="check-ico ${c.ok ? 'ok' : 'bad'}">
            ${c.ok
              ? '<svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>'
              : '<svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'}
          </div>
          <div class="check-body">
            <div class="num">${c.num.padStart(2, '0')}</div>
            <div class="nm">${tr(c.name)}</div>
            <div class="desc">${tr(c.desc)}</div>
          </div>
          <span class="badge cyan">${c.mcr}</span>
          <span class="check-toggle">${isOpen ? lblHide : lblShow}</span>
        </summary>
        <div class="check-detail">
          <div class="check-detail-row">
            <div class="check-detail-lbl">${lblWhat}</div>
            <div class="check-detail-val">${tr(c.details)}</div>
          </div>
          <div class="check-detail-row">
            <div class="check-detail-lbl">${lblResult}</div>
            <div class="check-detail-val ${c.ok ? 'ok' : 'bad'}">
              <span class="badge ${c.ok ? 'ok' : 'breach'}"><span class="bdot"></span>${c.ok ? T().confName : T().notConf}</span>
              <span style="margin-left:8px">${tr(c.desc)}</span>
            </div>
          </div>
        </div>
      </details>
    `;
    }).join('');
  }

  // Geometrías + Sobreposição subtabs removed in feedback-cleanup-1.
  // The data is still in d.geometries / d.overlaps but no longer rendered here.
  // It still appears in the Informe Técnico (PDF report).

  if (state.carSubtab === 'monitoring') {
    // Critical alert callout — built from the highest-severity entry in the
    // alertList, blended with crop info to produce a "what's wrong + where" line.
    const critical = d.alertList.find(a => a.sev === 'high') || d.alertList[0];
    const totalDetectedHa = d.crops.reduce((s, c) => s + c.ha, 0);
    const mainCrop = d.crops[0];
    const subCrop = d.crops[1];
    const hasAlert = d.monitorAlerts > 0;

    // Localized labels (kept inline — these are monitor-tab-only strings).
    const L_ = state.lang;
    const txt = {
      summaryHdr: L_ === 'en' ? 'CURRENT MONITORING SUMMARY' : (L_ === 'es' ? 'RESUMEN ACTUAL DEL MONITOREO' : 'RESUMO ATUAL DO MONITORAMENTO'),
      detectedCrop: L_ === 'en' ? 'Detected crop / area' : (L_ === 'es' ? 'Cultivo detectado / área detectada' : 'Cultura detectada / área detectada'),
      stateLbl: L_ === 'en' ? 'STATUS' : (L_ === 'es' ? 'ESTADO' : 'ESTADO'),
      critical: L_ === 'en' ? 'Critical alert' : (L_ === 'es' ? 'Alerta crítica' : 'Alerta crítico'),
      compliant: L_ === 'en' ? 'Compliant' : (L_ === 'es' ? 'Conforme' : 'Conforme'),
      totalDet: L_ === 'en' ? 'Total detected area' : (L_ === 'es' ? 'Área total detectada' : 'Área total detectada'),
      budgetCrop: L_ === 'en' ? 'Budgeted crop' : (L_ === 'es' ? 'Cultivo presupuestado' : 'Cultura orçada'),
      budgetArea: L_ === 'en' ? 'Budgeted area' : (L_ === 'es' ? 'Área presupuestada' : 'Área orçada'),
      criticalDeviation: L_ === 'en' ? 'Critical deviation' : (L_ === 'es' ? 'Desvío crítico' : 'Desvio crítico'),
      ndviBody: (lot, crop, dev) => L_ === 'en'
        ? `Plot ${lot} (${crop}, deviation ${dev}%) shows NDVI deviation greater than 30% from expected historical behavior.`
        : (L_ === 'es'
            ? `El lote ${lot} (${crop}, desvío ${dev}%) presenta desvío NDVI superior al 30% respecto al comportamiento histórico esperado.`
            : `O talhão ${lot} (${crop}, desvio ${dev}%) apresenta desvio NDVI superior a 30% em relação ao comportamento histórico esperado.`),
      art: L_ === 'en' ? 'Art. 7' : (L_ === 'es' ? 'Art. 7°' : 'Art. 7º'),
      noAlerts: L_ === 'en' ? 'All monitoring checks passed.' : (L_ === 'es' ? 'Todas las verificaciones de monitoreo pasaron.' : 'Todas as verificações de monitoramento passaram.'),
    };

    // Synthesize a "lot id" from the main crop and a deterministic deviation %.
    const lotId = (mainCrop ? mainCrop.name.slice(0, 1).toUpperCase() : 'L') + '02';
    const cropEsName = mainCrop && mainCrop.name === 'soja' ? t.soja : (mainCrop ? t.milho : '—');
    const dev = hasAlert ? '-' + (35 + (d.monitorAlerts * 7)).toFixed(1) : '0.0';

    // ----------------------------------------------------------------
    // HISTORIC tab — early return with timeline + score evolution + NDVI
    // ----------------------------------------------------------------
    if (state.monitorTab === 'historic') {
      const riskLevel = d.complianceScore < 60 ? 'high' : d.complianceScore < 80 ? 'medium' : 'low';
      const events = synthEventTimeline(d, state.lang, !!d.isLive, riskLevel);
      const scoreSeries = synthScoreSeries(d.complianceScore, riskLevel);

      // Multi-year NDVI: take lote with the most recent activity (lote[0]).
      // Prior-year curve = current curve smoothed and slightly different
      // (deterministic noise so it doesn't overlap exactly).
      const mainLote = d.lotes[0] || null;
      let priorYearCurve = null;
      if (mainLote) {
        priorYearCurve = mainLote.curve.map((v, i) => {
          // Simple deterministic offset based on index for stable rendering.
          const offset = ((i * 7919) % 100 - 50) / 1000;  // ±0.05
          return +Math.max(0.05, Math.min(0.95, v * 1.04 + offset)).toFixed(3);
        });
      }

      const L_ = state.lang;
      const txt = {
        timelineTitle:    L_ === 'en' ? 'Event timeline' : (L_ === 'es' ? 'Línea de tiempo de eventos' : 'Linha do tempo de eventos'),
        timelineSub:      L_ === 'en' ? 'Last 12 months' : (L_ === 'es' ? 'Últimos 12 meses' : 'Últimos 12 meses'),
        scoreTitle:       L_ === 'en' ? 'Compliance Score evolution' : (L_ === 'es' ? 'Evolución del Score de Compliance' : 'Evolução do Score de Compliance'),
        scoreSub:         L_ === 'en' ? '12 monthly snapshots — thresholds at 60 / 80' : (L_ === 'es' ? '12 mediciones mensuales — umbrales en 60 / 80' : '12 medições mensais — limiares 60 / 80'),
        scoreCurrent:     L_ === 'en' ? 'Current' : (L_ === 'es' ? 'Actual' : 'Atual'),
        ndviTitle:        L_ === 'en' ? 'Multi-year NDVI — main lote' : (L_ === 'es' ? 'NDVI plurianual — lote principal' : 'NDVI plurianual — lote principal'),
        ndviSub:          L_ === 'en' ? 'Current vs previous year — same plot' : (L_ === 'es' ? 'Año actual vs año anterior — mismo lote' : 'Ano atual vs ano anterior — mesmo lote'),
        legendCurrent:    L_ === 'en' ? 'Current year' : (L_ === 'es' ? 'Año actual' : 'Ano atual'),
        legendPrior:      L_ === 'en' ? 'Previous year' : (L_ === 'es' ? 'Año anterior' : 'Ano anterior'),
        active:           L_ === 'en' ? 'Active' : (L_ === 'es' ? 'Activa' : 'Ativa'),
        resolved:         L_ === 'en' ? 'Resolved' : (L_ === 'es' ? 'Resuelta' : 'Resolvida'),
      };

      const scoreClass = d.complianceScore >= 80 ? 'ok' : d.complianceScore >= 60 ? 'warn' : 'bad';
      const eventTypeIcon = (type) => {
        const map = {
          alert:  '<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
          sweep:  '<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>',
          review: '<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>',
          doc:    '<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
          status: '<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3h7v7H3zM14 14h7v7h-7zM10 10l4 4M14 3l7 7"/></svg>',
        };
        return map[type] || map.status;
      };

      return `
        <div class="subtab-bar">
          <button data-monitor="current" class="${state.monitorTab === 'current' ? 'active' : ''}">${t.current}</button>
          <button data-monitor="historic" class="${state.monitorTab === 'historic' ? 'active' : ''}">${t.historic}</button>
        </div>

        <!-- Compliance Score evolution -->
        <div class="card mb-16">
          <div class="card-head" style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <h3>${txt.scoreTitle}</h3>
              <div class="sub">${txt.scoreSub}</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-weight:600">${txt.scoreCurrent}</div>
              <div class="score-big score-${scoreClass}">${d.complianceScore}<span class="score-unit">/100</span></div>
            </div>
          </div>
          <div class="card-body">
            ${renderScoreSparkline(scoreSeries, d.complianceScore)}
          </div>
        </div>

        <!-- Event timeline -->
        <div class="card mb-16">
          <div class="card-head">
            <div>
              <h3>${txt.timelineTitle}</h3>
              <div class="sub">${txt.timelineSub} · ${events.length} ${L_ === 'en' ? 'events' : 'eventos'}</div>
            </div>
          </div>
          <div class="card-body">
            <ul class="event-timeline">
              ${events.map(e => `
                <li class="evt evt-${e.sev}">
                  <div class="evt-marker">${eventTypeIcon(e.type)}</div>
                  <div class="evt-body">
                    <div class="evt-head">
                      <span class="evt-title">${e.title}</span>
                      ${e.status === 'active'   ? `<span class="laudo-badge bad">${txt.active}</span>` : ''}
                      ${e.status === 'resolved' ? `<span class="laudo-badge ok">${txt.resolved}</span>` : ''}
                    </div>
                    <div class="evt-desc">${e.desc}</div>
                    <div class="evt-date">${e.date}</div>
                  </div>
                </li>
              `).join('')}
            </ul>
          </div>
        </div>

        ${mainLote ? `
          <!-- Multi-year NDVI overlay -->
          <div class="card">
            <div class="card-head">
              <div>
                <h3>${txt.ndviTitle}</h3>
                <div class="sub">${txt.ndviSub} (Lote <strong>${mainLote.id}</strong>, ${mainLote.crop})</div>
              </div>
            </div>
            <div class="card-body">
              <div class="ndvi-card-chart">${renderNDVIChartMultiYear(mainLote.curve, priorYearCurve)}</div>
              <div class="ndvi-legend" style="margin-top:8px">
                <span><span class="sw" style="background:#2E5BFF"></span>${txt.legendCurrent}</span>
                <span><span class="sw" style="background:#5A6270;border-radius:0;height:2px"></span>${txt.legendPrior}</span>
              </div>
            </div>
          </div>
        ` : ''}
      `;
    }

    return `
      <div class="subtab-bar">
        <button data-monitor="current" class="${state.monitorTab === 'current' ? 'active' : ''}">${t.current}</button>
        <button data-monitor="historic" class="${state.monitorTab === 'historic' ? 'active' : ''}">${t.historic}</button>
      </div>

      <!-- Resumen actual: crops detected + state -->
      <div class="card mb-16">
        <div class="card-body">
          <div class="monitor-summary-head">
            <div>
              <div class="section-eyebrow">${txt.summaryHdr}</div>
              <div class="section-sub">${txt.detectedCrop}</div>
            </div>
            <div class="state-pill">
              <div class="section-eyebrow" style="margin-bottom:6px">${txt.stateLbl}</div>
              <span class="badge ${hasAlert ? 'breach' : 'ok'}" style="font-size:13px;padding:6px 14px">
                <span class="bdot"></span>${hasAlert ? txt.critical : txt.compliant}
              </span>
            </div>
          </div>

          <div class="crop-cards">
            ${d.crops.map(c => `
              <div class="crop-card">
                <div class="crop-name">${c.name === 'soja' ? t.soja : t.milho}</div>
                <div class="crop-ha">${fmt.int(Math.round(c.ha))} ha</div>
              </div>
            `).join('')}
          </div>

          <div class="monitor-meta">
            <span><span class="lbl">${txt.totalDet}:</span> <strong>${fmt.int(Math.round(totalDetectedHa))} ha</strong></span>
            ${mainCrop ? `<span><span class="lbl">${txt.budgetCrop}:</span> <strong>${cropEsName}</strong></span>` : ''}
            ${mainCrop ? `<span><span class="lbl">${txt.budgetArea}:</span> <strong>${fmt.int(Math.round(mainCrop.ha * 0.88))} ha</strong></span>` : ''}
          </div>
        </div>
      </div>

      ${hasAlert ? `
        <!-- Big critical-alert callout -->
        <div class="critical-callout">
          <div class="critical-icon">
            <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
              <line x1="12" y1="9" x2="12" y2="13"/>
              <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
          </div>
          <div class="critical-body">
            <div class="critical-title">${txt.critical} — CMN 5.267 (${txt.art})</div>
            <div class="critical-msg">${txt.ndviBody(`<strong>${lotId}</strong>`, cropEsName, dev)}</div>
            <span class="badge breach" style="margin-top:10px"><span class="bdot"></span>${txt.criticalDeviation}</span>
          </div>
        </div>
      ` : `
        <div class="critical-callout ok-callout">
          <div class="critical-icon ok"><svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="critical-body"><div class="critical-title" style="color:var(--green)">${txt.compliant}</div><div class="critical-msg">${txt.noAlerts}</div></div>
        </div>
      `}

      <!-- Two-up KPIs: alerts + veg cover -->
      <div class="kpis" style="grid-template-columns:1fr 1fr;margin-bottom:14px">
        <div class="kpi" style="${hasAlert ? 'border-color:var(--red);' : ''}">
          <div class="row1">
            <div class="lbl">${t.activeAlerts}</div>
            <div class="ico ${hasAlert ? 'red' : 'green'}"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg></div>
          </div>
          <div class="val" style="color:${hasAlert ? 'var(--red)' : 'var(--green)'};font-size:36px">${d.monitorAlerts}</div>
        </div>
        <div class="kpi">
          <div class="row1">
            <div class="lbl">${t.vegCover}</div>
            <div class="ico green"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2 L12 22 M5 9 L12 2 L19 9"/></svg></div>
          </div>
          <div class="val" style="color:var(--green);font-size:36px">${d.monitorVeg}%</div>
        </div>
      </div>

      <!-- Active alerts list -->
      ${d.alertList.length > 0 ? `
        <div class="card mb-16">
          <div class="card-head"><div><h3>${t.activeAlerts} — ${d.car.slice(0, 24)}…</h3></div></div>
          <div class="card-body">
            ${d.alertList.map(a => {
              const sevName = a.sev === 'high' ? t.high : (a.sev === 'medium' ? t.med : t.low);
              const sevBadge = a.sev === 'high' ? 'breach' : (a.sev === 'medium' ? 'watch' : 'violet');
              const kindName = a.kind === 'embargo' ? t.embargo : (a.kind === 'fire' ? t.fire : (a.kind === 'overlap' ? t.overlap2 : t.deforestation));
              return `
                <div class="alert-card ${a.sev === 'high' ? '' : (a.sev === 'medium' ? 'warn' : 'info')}">
                  <div class="head">
                    <span class="nm">${kindName}</span>
                    <span class="badge ${sevBadge}"><span class="bdot"></span>${sevName}</span>
                  </div>
                  <div class="sub">${a.id} · ${a.date} · ${a.area} ha · ${a.conf}% ${t.confidence} · ${a.sat}</div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      ` : ''}

      <!-- Historic NDVI chart per lote (last 12 months) -->
      ${d.lotes && d.lotes.length > 0 ? `
        <div class="card mb-16">
          <div class="card-head">
            <div>
              <h3>${state.lang === 'en' ? 'NDVI history — last 12 months' : (state.lang === 'es' ? 'Histórico NDVI — últimos 12 meses' : 'Histórico NDVI — últimos 12 meses')}</h3>
              <div class="sub">${d.isLive
                ? `${state.lang === 'en' ? '🛰 Live Sentinel-2 L2A · last fetch' : (state.lang === 'es' ? '🛰 Sentinel-2 L2A en vivo · última actualización' : '🛰 Sentinel-2 L2A em vivo · última atualização')}: ${d.liveMeta && d.liveMeta.fetched_at ? d.liveMeta.fetched_at.slice(0, 10) : '—'}`
                : (state.lang === 'en' ? 'Per-plot evolution vs regional reference. Synthetic baseline.' : (state.lang === 'es' ? 'Evolución por lote vs referencia regional. Datos de referencia.' : 'Evolução por lote vs referência regional. Dados de referência.'))}</div>
            </div>
          </div>
          <div class="card-body">
            ${d.lotes.map(l => {
              const cropMap = { soja: state.lang === 'en' ? 'Soy' : 'Soja', milho: state.lang === 'en' ? 'Corn' : (state.lang === 'es' ? 'Maíz' : 'Milho'), pastagem: state.lang === 'en' ? 'Pasture' : (state.lang === 'es' ? 'Pasturas' : 'Pastagem'), trigo: state.lang === 'en' ? 'Wheat' : 'Trigo', algodao: state.lang === 'en' ? 'Cotton' : (state.lang === 'es' ? 'Algodón' : 'Algodão') };
              const devColor = Math.abs(l.deviation) > 30 ? 'var(--red)' : Math.abs(l.deviation) > 15 ? 'var(--amber)' : 'var(--green)';
              return `
                <div class="ndvi-card">
                  <div class="ndvi-card-head">
                    <div>
                      <div class="ndvi-card-title">Lote <strong>${l.id}</strong> · ${cropMap[l.crop] || l.crop} · ${fmt.int(l.ha)} ha</div>
                      <div class="ndvi-card-meta">NDVI <strong>${l.ndviCurrent.toFixed(2)}</strong> · ${state.lang === 'en' ? 'Regional ref' : (state.lang === 'es' ? 'Ref regional' : 'Ref regional')} <strong>${l.ndviRef.toFixed(2)}</strong></div>
                    </div>
                    <div style="text-align:right">
                      <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-weight:600">${state.lang === 'en' ? 'Deviation' : (state.lang === 'es' ? 'Desvío' : 'Desvio')}</div>
                      <div style="font-size:22px;font-weight:600;font-family:var(--mono);color:${devColor}">${l.deviation > 0 ? '+' : ''}${l.deviation}%</div>
                    </div>
                  </div>
                  <div class="ndvi-card-chart">${renderNDVIChart(l)}</div>
                  <div class="ndvi-legend">
                    <span><span class="sw" style="background:#D63A3A"></span>Lote ${l.id}</span>
                    <span><span class="sw" style="background:#C77400"></span>${state.lang === 'en' ? 'Regional reference' : (state.lang === 'es' ? 'Referencia regional' : 'Referência regional')}</span>
                    <span><span class="sw" style="background:#FFE4B5"></span>${state.lang === 'en' ? 'Confidence band ±0.08' : (state.lang === 'es' ? 'Banda confianza ±0.08' : 'Banda confiança ±0.08')}</span>
                    <span><span class="sw" style="background:#D63A3A;border-radius:50%;width:10px;height:10px"></span>${state.lang === 'en' ? 'Alert (>15% deviation)' : (state.lang === 'es' ? 'Alerta (>15% desvío)' : 'Alerta (>15% desvio)')}</span>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      ` : ''}

      <!-- Map of plots -->
      <div class="card">
        <div class="card-head"><div><h3>${t.talhoes}</h3></div></div>
        <div class="card-body">${renderTalhoes(d)}</div>
      </div>
    `;
  }
}

function renderTalhoes(d) {
  const c1 = d.crops[0]; const c2 = d.crops[1];
  return `
    <div class="talhao-map">
      <svg viewBox="0 0 400 280" style="width:100%;display:block;">
        <defs>
          <pattern id="grid2" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(15,26,46,0.04)" stroke-width="1"/>
          </pattern>
        </defs>
        <rect width="400" height="280" fill="url(#grid2)"/>
        ${c1 ? `<path d="M 60 50 Q 120 40 180 60 L 220 90 L 200 160 Q 140 170 80 150 Z" fill="${c1.color}" fill-opacity="0.35" stroke="${c1.color}" stroke-width="2"/>` : ''}
        ${c2 ? `<path d="M 220 90 L 320 100 L 340 200 L 240 220 L 200 160 Z" fill="${c2.color}" fill-opacity="0.35" stroke="${c2.color}" stroke-width="2"/>` : ''}
        ${d.alertList && d.alertList.filter(a => a.sev === 'high').map((_, i) => `
          <circle cx="${180 + i*30}" cy="${110 + i*20}" r="5" fill="#D63A3A">
            <animate attributeName="r" values="5;10;5" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
          </circle>
        `).join('') || ''}
        ${c1 ? `<text x="100" y="100" font-size="11" font-weight="600" fill="#0A0B0D">${c1.name === 'soja' ? T().soja : T().milho} · ${c1.ha.toFixed(1)} ha</text>` : ''}
        ${c2 ? `<text x="240" y="160" font-size="11" font-weight="600" fill="#0A0B0D">${c2.name === 'soja' ? T().soja : T().milho} · ${c2.ha.toFixed(1)} ha</text>` : ''}
        <g transform="translate(370,30)">
          <circle r="14" fill="#fff" stroke="#0A0B0D" stroke-width="1"/>
          <path d="M 0 -10 L 3 0 L 0 10 L -3 0 Z" fill="#0A0B0D"/>
          <text y="-16" text-anchor="middle" font-size="9" fill="#0A0B0D">N</text>
        </g>
        <text x="20" y="265" font-size="10" fill="#5A6270">Sentinel-2 · 10m · 2026-05-02</text>
      </svg>
    </div>
  `;
}

// ===========================================================================
// MONITOR
// ===========================================================================
function renderMonitor() {
  const t = T();
  // Auto-pick: explicit consult takes priority; otherwise show the first
  // breach predio in the current country (most actionable). Falls back to
  // first watch, then first predio.
  const target = state.lastConsultedCar
    || PROPS.find(p => p.status === 'breach')?.car
    || PROPS.find(p => p.status === 'watch')?.car
    || PROPS[0]?.car;

  if (!target) {
    // No data at all — keep the original empty state.
    return `
      <div class="page-head"><div><h1>${t.monitor}</h1><div class="sub">${t.tagline}</div></div></div>
      <div class="empty">
        <div class="empty-ico"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></div>
        <h2>${t.monitorEmpty}</h2><p>${t.monitorEmpty2}</p>
        <div class="empty-actions">
          <button class="btn btn-ghost" data-mod-go="panel">${t.goPanel}</button>
          <button class="btn btn-primary" data-mod-go="scanner">${t.goScanner}</button>
        </div>
      </div>
    `;
  }

  // Watchlist: top 5 breach + watch predios for the current country, with
  // the active one highlighted. Click on a row swaps which predio is shown.
  const watchlist = PROPS
    .filter(p => p.status !== 'ok')
    .sort((a, b) => (b.risk || 0) - (a.risk || 0))
    .slice(0, 5);

  const subLbl = state.lang === 'en' ? 'Active monitoring watchlist' :
                 state.lang === 'es' ? 'Lista de monitoreo activo' : 'Lista de monitoramento ativo';
  const showingLbl = state.lang === 'en' ? 'Showing' : (state.lang === 'es' ? 'Mostrando' : 'Mostrando');

  return `
    <div class="page-head">
      <div>
        <h1>${t.monitor}</h1>
        <div class="sub">${subLbl} · ${target.slice(0, 32)}…</div>
      </div>
    </div>

    ${watchlist.length > 0 ? `
      <div class="watchlist-bar">
        <div class="watchlist-lbl">${showingLbl}:</div>
        ${watchlist.map(p => `
          <button class="watchlist-item ${p.car === target ? 'active' : ''}" data-watchlist="${p.car}">
            <span class="badge ${p.status}"><span class="bdot"></span></span>
            <span class="nm">${p.muni}, ${p.uf}</span>
            <span class="meta">${fmt.int(p.ha)} ha</span>
          </button>
        `).join('')}
      </div>
    ` : ''}

    ${renderCarDetail(target)}
  `;
}

// ===========================================================================
// HANDLERS
// ===========================================================================
// Notification dropdown helpers — global so they can be called from render
// (to refresh content) and from handlers (to open/close).
function openNotifDropdown() {
  const dd = $('#notif-dropdown');
  if (!dd) return;
  dd.innerHTML = renderNotificationsDropdown();
  dd.hidden = false;
  // Re-bind notification item click handlers (the dropdown HTML is fresh).
  $$('[data-notif-go]').forEach(b => b.addEventListener('click', () => {
    const [country, car] = b.dataset.notifGo.split('|');
    setCountry(country);
    state.module = 'scanner';
    state.scannerView = 'car';
    state.scannerCar = car;
    state.lastConsultedCar = car;
    state.carSubtab = 'monitoring';
    closeNotifDropdown();
    render();
  }));
}
function closeNotifDropdown() {
  const dd = $('#notif-dropdown');
  if (dd) dd.hidden = true;
}

function attachHandlers() {
  $$('.side-item').forEach(b => b.addEventListener('click', () => {
    state.module = b.dataset.mod;
    state.scannerView = 'input';
    closeNotifDropdown();
    closeSidebar();        // close mobile sidebar overlay after module change
    render();
  }));
  $$('[data-country]').forEach(el => el.addEventListener('click', () => {
    setCountry(el.dataset.country);
    closeNotifDropdown();
    closeSidebar();        // ditto for country switch from inside sidebar
    render();
  }));
  // Bell button → toggle notification dropdown.
  const bell = $('#bell-btn');
  if (bell) bell.addEventListener('click', (e) => {
    e.stopPropagation();
    const dd = $('#notif-dropdown');
    if (dd && dd.hidden) openNotifDropdown(); else closeNotifDropdown();
  });
  $$('[data-mod-go]').forEach(b => b.addEventListener('click', () => {
    state.module = b.dataset.modGo;
    render();
  }));
  // Click on a region in the legend → filter by region (toggle).
  $$('[data-region]').forEach(el => el.addEventListener('click', () => {
    const id = el.dataset.region;
    state.filterRegion = state.filterRegion === id ? 'all' : id;
    state.filterUf = null;
    state.page = 1;
    render();
  }));
  // Click on a state on the map → filter by UF (toggle).
  $$('[data-uf]').forEach(el => el.addEventListener('click', () => {
    const uf = el.dataset.uf;
    state.filterUf = state.filterUf === uf ? null : uf;
    state.filterRegion = 'all';
    state.page = 1;
    render();
  }));
  // Hover on a state → tooltip with UF, # CARs, total ha.
  const tip = $('#map-tip');
  if (tip) {
    const stage = tip.parentElement;
    $$('[data-uf]').forEach(el => {
      el.addEventListener('mousemove', (e) => {
        const uf = el.dataset.uf;
        const meta = MAP_DATA.states[uf];
        const s = STATS.byUf[uf] || { cars: 0, ha: 0 };
        const rect = stage.getBoundingClientRect();
        tip.style.left = (e.clientX - rect.left) + 'px';
        tip.style.top  = (e.clientY - rect.top) + 'px';
        tip.innerHTML = `<div class="ttl">${meta.name} (${uf})</div>
          <div class="row"><strong>${fmt.int(s.cars)}</strong> CARs</div>
          <div class="row"><strong>${fmt.int(Math.round(s.ha))}</strong> ha</div>`;
        tip.style.display = 'block';
      });
      el.addEventListener('mouseleave', () => { tip.style.display = 'none'; });
    });
  }
  // Clear UF filter.
  const clearUf = $('#clear-uf');
  if (clearUf) clearUf.addEventListener('click', () => {
    state.filterUf = null;
    state.page = 1;
    render();
  });
  // KPI "Alertas activas" → toggle filter to predios with breach or watch.
  const kpiAlerts = $('#kpi-alerts');
  if (kpiAlerts) kpiAlerts.addEventListener('click', () => {
    state.filterAlerts = !state.filterAlerts;
    state.page = 1;
    render();
    // Scroll the table into view so the user sees the result.
    setTimeout(() => {
      const tableCard = document.querySelector('.card .pagination');
      if (tableCard) tableCard.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }, 50);
  });
  // Region filter chips below the table.
  $$('[data-region-chip]').forEach(el => el.addEventListener('click', () => {
    state.filterRegion = el.dataset.regionChip;
    state.filterUf = null;
    state.page = 1;
    render();
  }));
  $$('[data-status]').forEach(el => el.addEventListener('click', () => {
    state.filterStatus = el.dataset.status;
    state.page = 1;
    render();
  }));
  const pgPrev = $('#pg-prev'); if (pgPrev) pgPrev.addEventListener('click', () => { if (state.page > 1) { state.page--; render(); } });
  const pgNext = $('#pg-next'); if (pgNext) pgNext.addEventListener('click', () => { state.page++; render(); });

  $$('tr[data-car]').forEach(tr => tr.addEventListener('click', () => {
    state.scannerCar = tr.dataset.car;
    state.lastConsultedCar = tr.dataset.car;
    state.scannerView = 'car';
    state.module = 'scanner';
    state.carSubtab = 'audit';
    render();
  }));
  $$('[data-tab]').forEach(b => b.addEventListener('click', () => {
    state.scannerTab = b.dataset.tab;
    state.scannerInput = '';
    render();
  }));
  $$('[data-fill]').forEach(el => el.addEventListener('click', () => {
    state.scannerInput = el.dataset.fill;
    const inp = $('#scan-input');
    if (inp) inp.value = el.dataset.fill;
  }));
  $$('[data-go-entity]').forEach(el => el.addEventListener('click', () => {
    const cnpj = el.dataset.goEntity;
    state.scannerLoading = true; render();
    setTimeout(() => {
      state.scannerEntity = ENTITY_DETAIL[cnpj];
      state.scannerView = 'entity';
      state.scannerLoading = false; render();
    }, 500);
  }));
  $$('[data-go-car]').forEach(el => el.addEventListener('click', () => {
    const car = el.dataset.goCar;
    state.scannerLoading = true; render();
    setTimeout(() => {
      state.scannerCar = car;
      state.lastConsultedCar = car;
      state.scannerView = 'car';
      state.carSubtab = 'audit';
      state.scannerLoading = false; render();
    }, 500);
  }));
  const inp = $('#scan-input');
  if (inp) inp.addEventListener('input', e => state.scannerInput = e.target.value);
  const goBtn = $('#scan-go');
  if (goBtn) goBtn.addEventListener('click', () => {
    state.scannerLoading = true; render();
    setTimeout(() => {
      state.scannerLoading = false;
      if (state.scannerTab === 'CAR') {
        const c = state.scannerInput.trim();
        state.scannerCar = (CAR_DETAIL[c] || PROPS.find(p => p.car === c)) ? c : 'MT-5108402-B4F12C2614C7794E50A4B8D331EE7702';
        state.lastConsultedCar = state.scannerCar;
        state.scannerView = 'car';
        state.carSubtab = 'audit';
      } else if (state.scannerTab === 'CNPJ' || state.scannerTab === 'CPF') {
        state.scannerEntity = ENTITY_DETAIL['12.345.678/0001-90'];
        state.scannerView = 'entity';
      }
      render();
    }, 600);
  });
  const dz = $('#dz');
  if (dz) {
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('over'));
    dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); });
  }
  $$('[data-back-scanner]').forEach(a => a.addEventListener('click', () => {
    state.scannerView = 'input';
    state.scannerEntity = null;
    state.scannerCar = null;
    render();
  }));
  $$('[data-sub]').forEach(b => b.addEventListener('click', () => {
    state.carSubtab = b.dataset.sub;
    render();
  }));
  // Laudo técnico button → open the full report in a new window/tab.
  $$('[data-laudo]').forEach(b => b.addEventListener('click', () => {
    openLaudo(b.dataset.laudo);
  }));
  // Notification dropdown items → navigate to the predio's CAR detail.
  $$('[data-notif-go]').forEach(b => b.addEventListener('click', () => {
    const [country, car] = b.dataset.notifGo.split('|');
    setCountry(country);
    state.module = 'scanner';
    state.scannerView = 'car';
    state.scannerCar = car;
    state.lastConsultedCar = car;
    state.carSubtab = 'monitoring';   // jump to where alerts live
    closeNotifDropdown();
    render();
  }));
  // Watchlist click in Monitoreo Sekura → swap which predio is shown.
  $$('[data-watchlist]').forEach(b => b.addEventListener('click', () => {
    state.lastConsultedCar = b.dataset.watchlist;
    render();
  }));
  // Persist checkpoint open/close state across re-renders.
  $$('[data-cp]').forEach(d => d.addEventListener('toggle', () => {
    const idx = parseInt(d.dataset.cp, 10);
    if (d.open) state.openCheckpoints.add(idx);
    else        state.openCheckpoints.delete(idx);
  }));
  $$('[data-monitor]').forEach(b => b.addEventListener('click', () => {
    state.monitorTab = b.dataset.monitor;
    render();
  }));
  $$('#lang button').forEach(b => b.addEventListener('click', () => {
    state.lang = b.dataset.l;
    render();
  }));
  // Mobile language picker (native <select>)
  const langMobile = $('#lang-mobile');
  if (langMobile) langMobile.addEventListener('change', (e) => {
    state.lang = e.target.value;
    render();
  });
}

// =====================================================================
// MOBILE SIDEBAR OVERLAY — open / close / scrim / Esc / outside click.
// Registered ONCE at boot (not in attachHandlers, which re-runs each render).
// =====================================================================
function openSidebar() {
  const sb = $('#sidebar'); const sc = $('#scrim'); const ham = $('#hamburger');
  if (!sb) return;
  sb.classList.add('is-open');
  if (sc) { sc.hidden = false; sc.classList.add('is-active'); }
  if (ham) ham.setAttribute('aria-expanded', 'true');
  document.body.classList.add('is-locked');
}
function closeSidebar() {
  const sb = $('#sidebar'); const sc = $('#scrim'); const ham = $('#hamburger');
  if (!sb) return;
  sb.classList.remove('is-open');
  if (sc) { sc.classList.remove('is-active'); setTimeout(() => { sc.hidden = true; }, 240); }
  if (ham) ham.setAttribute('aria-expanded', 'false');
  document.body.classList.remove('is-locked');
}

const __ham = document.getElementById('hamburger');
if (__ham) __ham.addEventListener('click', openSidebar);
const __sbClose = document.getElementById('sidebar-close');
if (__sbClose) __sbClose.addEventListener('click', closeSidebar);
const __scrim = document.getElementById('scrim');
if (__scrim) __scrim.addEventListener('click', closeSidebar);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const sb = document.getElementById('sidebar');
    if (sb && sb.classList.contains('is-open')) closeSidebar();
  }
});

// Boot: try to restore from URL hash, fall back to BR / panel.
setCountry('BR');
applyHash();
render();

// Outside-click closes the notification dropdown. Registered once at boot
// (not in attachHandlers) so re-renders don't pile listeners.
document.addEventListener('click', (e) => {
  const dd = $('#notif-dropdown');
  if (!dd || dd.hidden) return;
  const insideDropdown = e.target.closest && e.target.closest('#notif-dropdown');
  const onBell = e.target.closest && e.target.closest('#bell-btn');
  if (!insideDropdown && !onBell) closeNotifDropdown();
});
// ESC also closes the dropdown.
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeNotifDropdown();
});

// Listen for back/forward navigation — re-apply state from URL hash.
window.addEventListener('popstate', () => {
  applyHash();
  render();
});
window.addEventListener('hashchange', (e) => {
  // Ignore hash changes triggered by our own replaceState.
  const expected = '#' + [state.country, state.module].concat(
    state.module === 'scanner' && state.scannerView === 'car' && state.scannerCar ? [state.scannerCar] : []
  ).join('/');
  if (location.hash !== expected) {
    applyHash();
    render();
  }
});
</script>
</body>
