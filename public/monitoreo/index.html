<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sekura Monitoreo — garantías rurales</title>
<link rel="icon" type="image/png" href="logo-horizontal.png">
<link rel="apple-touch-icon" href="logo-horizontal.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F8FA;
    --surface: #FFFFFF;
    --surface2: #FAFBFC;
    --border: #EAECEF;
    --borderHi: #D5D9DF;
    --ink: #0A0B0D;
    --ink2: #1F2329;
    --muted: #5A6270;
    --faint: #8A93A0;
    --brand: #0F1A2E;
    --brand2: #1B2840;
    --accent: #2E5BFF;
    --accent2: #1E3FB8;
    --green: #0EA471;
    --greenBg: #E6F7EF;
    --amber: #C77400;
    --amberBg: #FFF4DC;
    --red: #D63A3A;
    --redBg: #FCE8E8;
    --violet: #6B47DC;
    --violetBg: #EFEAFB;
    --sky: #0D7FBF;
    --skyBg: #E1F2FB;
    --r-sm: 6px;
    --r-md: 10px;
    --r-lg: 14px;
    --shadow-sm: 0 1px 2px rgba(15,26,46,0.04);
    --shadow-md: 0 1px 3px rgba(15,26,46,0.04), 0 4px 12px rgba(15,26,46,0.04);
    --sans: 'Geist', -apple-system, system-ui, 'Segoe UI', sans-serif;
    --mono: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    letter-spacing: -0.005em;
  }
  button { font-family: inherit; }
  a { color: var(--accent); text-decoration: none; cursor: pointer; }
  a:hover { text-decoration: underline; }

  
  /* ========== COUNTRY TABS ========== */
  .country-tabs {
    display: flex; gap: 4px;
    background: var(--surface); padding: 8px 24px 0;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .country-tab {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px 12px;
    background: transparent; border: none; cursor: pointer;
    font-family: var(--sans); font-size: 13px; font-weight: 500;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 120ms;
  }
  .country-tab:hover { color: var(--ink); }
  .country-tab.active {
    color: var(--ink); border-bottom-color: var(--brand);
    font-weight: 600;
  }
  .country-tab .flag { font-size: 16px; line-height: 1; }
  .country-tab .ct {
    font-size: 11px; font-weight: 500;
    background: var(--surface2); color: var(--muted);
    padding: 2px 7px; border-radius: 999px;
  }
  .country-tab.active .ct { background: var(--brand); color: white; }

  /* ========== APP SHELL ========== */
  .app { display: flex; flex-direction: column; height: 100vh; }

  .topbar {
    /* Topbar height accommodates logo + 12px vertical padding minimum.
       Desktop: 40px logo + 24px (2×12) = 64px. Tablet: 36+24=60. Mobile: 32+24=56.
       (Tablet/mobile heights are set inside @media blocks below.) */
    height: 64px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 12px 24px; gap: 24px;
    flex-shrink: 0;
  }
  .brand { display: flex; align-items: center; text-decoration: none; }
  .brand-logo {
    /* Sekura Monitoreo logo. Horizontal layout (shield + wordmark side-by-side
       in the asset). Heights are responsive — width auto preserves aspect ratio. */
    height: 40px; width: auto; display: block;
  }
  /* Legacy classes kept defined to avoid breaking anything that may still reference them. */
  .brand-mark, .brand-name { display: none; }
  .topbar .right { margin-left: auto; display: flex; align-items: center; gap: 14px; }

  .lang {
    display: flex; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px; padding: 2px;
  }
  .lang button {
    padding: 4px 10px; font-size: 12px; font-weight: 500;
    background: transparent; color: var(--muted); border: none; cursor: pointer;
    border-radius: 6px;
  }
  .lang button:hover { color: var(--ink); }
  .lang button.active { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-sm); }

  .icon-btn {
    width: 36px; height: 36px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    display: grid; place-items: center; cursor: pointer; color: var(--muted);
    position: relative;
  }
  .icon-btn:hover { color: var(--ink); border-color: var(--borderHi); }
  .icon-btn svg { width: 16px; height: 16px; }
  .notif-dot {
    position: absolute; top: 6px; right: 6px;
    width: 8px; height: 8px; background: var(--red);
    border-radius: 50%; border: 2px solid var(--surface);
  }
  .notif-wrap { position: relative; }
  .notif-badge {
    position: absolute; top: 2px; right: 2px;
    min-width: 16px; height: 16px; padding: 0 4px;
    background: var(--red); color: white;
    border: 2px solid var(--surface); border-radius: 999px;
    font-size: 10px; font-weight: 700; line-height: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--sans); font-feature-settings: 'tnum';
  }
  .notif-dropdown {
    position: absolute; top: calc(100% + 8px); right: 0;
    width: 380px; max-height: 480px; overflow: hidden;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; box-shadow: 0 8px 32px rgba(15,26,46,0.12);
    z-index: 50; display: flex; flex-direction: column;
  }
  .notif-dropdown[hidden] { display: none; }
  .notif-head {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
  }
  .notif-head h3 {
    margin: 0; font-size: 14px; font-weight: 600;
    letter-spacing: -0.01em;
  }
  .notif-head .ct {
    font-size: 11px; color: var(--muted);
    background: var(--surface2); padding: 2px 8px; border-radius: 999px;
  }
  .notif-list { overflow-y: auto; flex: 1; }
  .notif-item {
    display: grid; grid-template-columns: 32px 1fr auto;
    gap: 10px; padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 120ms;
    text-align: left; background: transparent; border-left: 0; border-right: 0; border-top: 0;
    width: 100%; font-family: inherit;
  }
  .notif-item:hover { background: var(--surface2); }
  .notif-item:last-child { border-bottom: none; }
  .notif-ico {
    width: 32px; height: 32px; border-radius: 50%;
    display: grid; place-items: center; flex-shrink: 0;
  }
  .notif-ico svg { width: 14px; height: 14px; }
  .notif-ico.high { background: var(--redBg); color: var(--red); }
  .notif-ico.medium { background: var(--amberBg); color: var(--amber); }
  .notif-ico.low { background: #EAF0FF; color: var(--accent); }
  .notif-body { min-width: 0; }
  .notif-title {
    font-size: 13px; font-weight: 500; color: var(--ink);
    margin-bottom: 2px; line-height: 1.3;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .notif-sub {
    font-size: 11px; color: var(--muted); line-height: 1.35;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .notif-meta {
    display: flex; flex-direction: column; align-items: flex-end;
    gap: 4px; flex-shrink: 0;
  }
  .notif-flag { font-size: 14px; line-height: 1; }
  .notif-date { font-size: 10px; color: var(--faint); font-family: var(--mono); }

  .user-chip {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 10px 4px 4px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 999px; cursor: pointer;
  }
  .user-chip:hover { border-color: var(--borderHi); }
  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, #2E5BFF, #6B47DC);
    color: white; display: grid; place-items: center;
    font-weight: 600; font-size: 12px;
  }
  .user-chip .nm { font-size: 13px; font-weight: 500; }

  /* ========== BODY ========== */
  .body { flex: 1; display: flex; min-height: 0; }
  .sidebar {
    width: 220px; background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 16px 12px;
    flex-shrink: 0;
  }
  .side-grp {
    font-size: 11px; font-weight: 600; color: var(--faint);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 8px 12px 6px;
  }
  .side-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 8px;
    color: var(--muted); font-size: 14px; font-weight: 500;
    cursor: pointer; border: none; background: transparent; width: 100%; text-align: left;
    transition: all 120ms ease;
  }
  .side-item:hover { background: var(--surface2); color: var(--ink); }
  .side-item.active { background: var(--brand); color: white; }
  .side-item.active:hover { background: var(--brand2); }
  .side-item svg { width: 18px; height: 18px; flex-shrink: 0; }
  .side-item .ct {
    margin-left: auto; font-size: 11px; font-weight: 500;
    background: rgba(0,0,0,0.06); padding: 1px 7px; border-radius: 999px;
  }
  .side-item.active .ct { background: rgba(255,255,255,0.18); color: white; }
  .side-spacer { flex: 1; }
  .side-foot {
    padding: 10px 12px; font-size: 11px; color: var(--faint);
    border-top: 1px solid var(--border); margin-top: 8px; line-height: 1.5;
  }
  .side-foot strong { color: var(--muted); font-weight: 500; }

  .main { flex: 1; min-width: 0; overflow: auto; }

  /* Fade-in transition for navigation between views (panel/scanner/monitor
     or different CARs). Filter toggles don't trigger this — they keep scroll
     position and don't fade. */
  .main.view-enter > .container { animation: viewFadeIn 240ms ease-out; }
  @keyframes viewFadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .container { padding: 24px 28px; max-width: 1480px; }

  /* ========== HEADERS ========== */
  .page-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 16px; margin-bottom: 22px; flex-wrap: wrap;
  }
  .page-head h1 {
    font-size: 24px; font-weight: 600; letter-spacing: -0.02em; margin: 0 0 4px;
  }
  .page-head .sub { color: var(--muted); font-size: 14px; }
  .page-head .actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* ========== BUTTONS ========== */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 16px; font-size: 13px; font-weight: 500;
    border-radius: 8px; cursor: pointer; border: 1px solid transparent;
    transition: all 120ms ease; line-height: 1;
  }
  .btn svg { width: 14px; height: 14px; }
  .btn-primary { background: var(--brand); color: white; }
  .btn-primary:hover { background: var(--brand2); }
  .btn-accent { background: var(--accent); color: white; }
  .btn-accent:hover { background: var(--accent2); }
  .btn-ghost {
    background: var(--surface); color: var(--ink2);
    border-color: var(--border);
  }
  .btn-ghost:hover { background: var(--surface2); border-color: var(--borderHi); }
  .btn-link {
    background: transparent; color: var(--accent); padding: 8px 12px;
  }
  .btn-link:hover { background: rgba(46,91,255,0.06); }

  /* ========== KPI CARDS ========== */
  .kpis {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 22px;
  }
  .kpi {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 20px;
    display: flex; flex-direction: column; gap: 12px; min-height: 120px;
  }
  .kpi .row1 { display: flex; align-items: center; justify-content: space-between; }
  .kpi .lbl { font-size: 13px; color: var(--muted); font-weight: 500; }
  .kpi .ico {
    width: 36px; height: 36px; border-radius: 8px;
    display: grid; place-items: center;
  }
  .kpi .ico svg { width: 16px; height: 16px; }
  .kpi .ico.blue { background: #EAF0FF; color: var(--accent); }
  .kpi .ico.green { background: var(--greenBg); color: var(--green); }
  .kpi .ico.amber { background: var(--amberBg); color: var(--amber); }
  .kpi .ico.red { background: var(--redBg); color: var(--red); }
  .kpi .ico.violet { background: var(--violetBg); color: var(--violet); }
  .kpi .val {
    font-size: 28px; font-weight: 600; letter-spacing: -0.02em;
    font-feature-settings: 'tnum';
  }
  .kpi .val .unit { font-size: 14px; color: var(--muted); font-weight: 500; margin-left: 4px; }
  .kpi .delta {
    display: flex; align-items: center; gap: 4px;
    font-size: 12px; font-weight: 500; color: var(--muted);
  }
  .kpi-clickable { cursor: pointer; transition: all 120ms; position: relative; }
  .kpi-clickable:hover { border-color: var(--borderHi); transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .kpi-clickable.kpi-active {
    border-color: var(--amber);
    box-shadow: 0 0 0 2px rgba(199,116,0,0.15);
    background: linear-gradient(180deg, var(--amberBg) 0%, var(--surface) 30%);
  }
  .delta-up { color: var(--green); }
  .delta-down { color: var(--red); }

  /* ========== CARDS / SECTIONS ========== */
  .grid-2 {
    display: grid; grid-template-columns: 1.6fr 1fr; gap: 14px; margin-bottom: 22px;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  }
  .card-head {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .card-head h3 {
    font-size: 15px; font-weight: 600; margin: 0; letter-spacing: -0.01em;
  }
  .card-head .sub { color: var(--muted); font-size: 13px; }
  .card-body { padding: 20px; }

  /* ========== MAP ========== */
  /* Hero layout: map on the left fills available space, legend column right. */
  .map-wrap {
    display: grid; grid-template-columns: 1fr 280px; gap: 28px;
    align-items: stretch; min-height: 540px;
  }
  .map-stage {
    position: relative; min-height: 540px;
    background: var(--surface2);
    border-radius: 10px; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    padding: 12px;
  }
  .map-stage svg { max-height: 100%; }
  .map-stage svg path:hover { filter: brightness(1.08); }
  .map-tip {
    position: absolute; pointer-events: none;
    background: var(--ink); color: white;
    padding: 8px 12px; border-radius: 8px;
    font-size: 12px; line-height: 1.45;
    box-shadow: 0 6px 20px rgba(0,0,0,0.18);
    transform: translate(-50%, -100%); margin-top: -8px;
    white-space: nowrap; z-index: 4;
  }
  .map-tip .ttl { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
  .map-tip .row { color: rgba(255,255,255,0.78); font-feature-settings: 'tnum'; }
  .map-tip .row strong { color: white; font-weight: 500; }

  .legend { display: flex; flex-direction: column; gap: 4px; align-self: center; }
  .legend-head {
    font-size: 11px; font-weight: 600; color: var(--faint);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px;
  }
  .legend-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 12px; border-radius: 8px; cursor: pointer;
    border: 1px solid transparent; transition: all 120ms;
  }
  .legend-item:hover { background: var(--surface2); }
  .legend-item.active { border-color: var(--borderHi); background: var(--surface2); }
  .legend-left { display: flex; align-items: center; gap: 10px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
  .legend-name { font-size: 13px; font-weight: 500; }
  .legend-pct {
    font-size: 12px; color: var(--muted);
    font-feature-settings: 'tnum'; font-variant-numeric: tabular-nums;
  }
  .legend-ct {
    font-size: 11px; color: var(--faint);
    margin-top: 1px;
  }
  .legend-clear {
    margin-top: 8px; padding: 8px 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; font-size: 12px; color: var(--muted);
    cursor: pointer; text-align: center; font-weight: 500;
  }
  .legend-clear:hover { background: var(--surface); border-color: var(--borderHi); color: var(--ink); }
  .legend-clear .uf { color: var(--ink); font-weight: 600; }

  /* ========== TABS / FILTER PILLS ========== */
  .pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill {
    padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 500;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); cursor: pointer; transition: all 120ms;
  }
  .pill:hover { color: var(--ink); border-color: var(--borderHi); }
  .pill.active {
    background: var(--brand); color: white; border-color: var(--brand);
  }
  .pill .ct {
    margin-left: 6px; padding: 1px 6px; background: rgba(0,0,0,0.06);
    border-radius: 999px; font-size: 11px;
  }
  .pill.active .ct { background: rgba(255,255,255,0.2); }

  /* ========== TABLE ========== */
  table.t { width: 100%; border-collapse: collapse; }
  table.t th {
    text-align: left; padding: 12px 18px; font-size: 11px; font-weight: 600;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em;
    background: var(--surface2); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 1;
  }
  table.t td {
    padding: 14px 18px; border-bottom: 1px solid var(--border);
    font-size: 13px; color: var(--ink2);
    font-feature-settings: 'tnum';
  }
  table.t tr:last-child td { border-bottom: none; }
  table.t tr.click { cursor: pointer; transition: background 120ms; }
  table.t tr.click:hover td { background: var(--surface2); }
  table.t .mono { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  table.t .strong { font-weight: 500; color: var(--ink); }
  table.t .right { text-align: right; }
  .car-cell { display: flex; flex-direction: column; gap: 2px; }
  .car-cell .a { font-family: var(--mono); font-size: 12px; color: var(--ink); font-weight: 500; }
  .car-cell .b { font-size: 11px; color: var(--faint); }

  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 500;
  }
  .badge .bdot { width: 6px; height: 6px; border-radius: 50%; }
  .badge.ok { background: var(--greenBg); color: var(--green); }
  .badge.ok .bdot { background: var(--green); }
  .badge.watch { background: var(--amberBg); color: var(--amber); }
  .badge.watch .bdot { background: var(--amber); }
  .badge.breach { background: var(--redBg); color: var(--red); }
  .badge.breach .bdot { background: var(--red); }
  .badge.cyan { background: var(--skyBg); color: var(--sky); }
  .badge.violet { background: var(--violetBg); color: var(--violet); }

  .avatar-sm {
    width: 26px; height: 26px; border-radius: 50%;
    display: inline-grid; place-items: center;
    color: white; font-weight: 600; font-size: 11px; flex-shrink: 0;
  }
  .owner-cell { display: flex; align-items: center; gap: 10px; }
  .owner-cell .nm { font-weight: 500; color: var(--ink); }
  .owner-cell .doc { font-size: 11px; color: var(--faint); font-family: var(--mono); }

  .pagination {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-top: 1px solid var(--border);
    font-size: 13px; color: var(--muted);
  }
  .pagination .controls { display: flex; gap: 6px; align-items: center; }
  .pg-btn {
    padding: 6px 12px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--ink2);
  }
  .pg-btn:hover:not(:disabled) { border-color: var(--borderHi); background: var(--surface2); }
  .pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ========== SCANNER ========== */
  .scanner-hero {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 36px; margin-bottom: 22px;
    text-align: center;
  }
  .scanner-ico {
    width: 64px; height: 64px; margin: 0 auto 16px;
    background: linear-gradient(135deg, #EAF0FF 0%, #DCE6FF 100%);
    border-radius: 16px; display: grid; place-items: center; color: var(--accent);
  }
  .scanner-ico svg { width: 28px; height: 28px; }
  .scanner-hero h2 {
    font-size: 22px; font-weight: 600; margin: 0 0 6px; letter-spacing: -0.02em;
  }
  .scanner-hero p {
    color: var(--muted); margin: 0 auto; max-width: 540px; font-size: 14px;
  }

  .seg-tabs {
    display: flex; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 10px; padding: 4px;
    margin-bottom: 16px; gap: 2px; overflow-x: auto;
  }
  .seg-tabs button {
    padding: 8px 16px; font-size: 13px; font-weight: 500;
    color: var(--muted); background: transparent; border: none; cursor: pointer;
    border-radius: 7px; white-space: nowrap;
  }
  .seg-tabs button:hover { color: var(--ink); }
  .seg-tabs button.active { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-sm); }

  .input-row {
    display: flex; gap: 10px; margin-bottom: 18px;
  }
  .input {
    flex: 1; padding: 12px 16px; font-size: 14px; font-family: var(--mono);
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    color: var(--ink); outline: none; transition: all 120ms;
  }
  .input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(46,91,255,0.1); }

  .sample-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
  }
  .sample-card h4 {
    font-size: 12px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin: 0 0 10px;
  }
  .sample-list { display: flex; flex-direction: column; gap: 6px; }
  .sample-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 10px; cursor: pointer;
    transition: all 120ms;
  }
  .sample-item:hover {
    border-color: var(--accent); background: #F5F8FF;
    transform: translateY(-1px); box-shadow: var(--shadow-md);
  }
  .sample-item .l { display: flex; flex-direction: column; gap: 2px; }
  .sample-item .doc { font-family: var(--mono); font-size: 13px; color: var(--ink); font-weight: 500; }
  .sample-item .nm { font-size: 12px; color: var(--muted); }
  .sample-item .arr { color: var(--accent); }

  .dropzone {
    border: 2px dashed var(--borderHi); border-radius: 14px;
    padding: 56px 24px; text-align: center; background: var(--surface2);
    cursor: pointer; transition: all 120ms;
  }
  .dropzone:hover, .dropzone.over {
    border-color: var(--accent); background: #F5F8FF;
  }
  .dropzone svg { width: 36px; height: 36px; color: var(--accent); margin-bottom: 14px; }
  .dropzone .t { font-size: 15px; font-weight: 500; color: var(--ink); margin-bottom: 6px; }
  .dropzone .s { font-size: 12px; color: var(--muted); }

  /* ========== BREADCRUMB ========== */
  .breadcrumb {
    display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
    font-size: 13px; color: var(--muted);
  }
  .breadcrumb .sep { color: var(--faint); }

  /* ========== ENTITY HEAD ========== */
  .entity-head {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px; margin-bottom: 16px;
    display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap;
  }
  .entity-avatar {
    width: 56px; height: 56px; border-radius: 14px;
    background: linear-gradient(135deg, #2E5BFF, #6B47DC);
    color: white; display: grid; place-items: center;
    font-size: 22px; font-weight: 600;
    flex-shrink: 0;
  }
  .entity-info { flex: 1; min-width: 240px; }
  .entity-info h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px; letter-spacing: -0.02em; }
  .entity-info .meta { color: var(--muted); font-size: 13px; }
  .entity-stats {
    display: flex; gap: 24px; padding-left: 24px; border-left: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .estat .lbl { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .estat .val { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }

  /* ========== CAR DETAIL ========== */
  .car-head-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px; margin-bottom: 16px;
  }
  .car-head-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 16px; flex-wrap: wrap; margin-bottom: 18px;
  }
  .car-head-top h1 {
    font-family: var(--mono); font-size: 14px; font-weight: 500;
    color: var(--ink2); margin: 0 0 6px; word-break: break-all;
  }
  .car-head-top .sub { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 4px; }
  .car-head-top .meta { font-size: 13px; color: var(--muted); }
  .car-head-top .actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .car-grid {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 1px;
    background: var(--border); border-radius: 12px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .car-cell-m {
    background: var(--surface); padding: 14px 18px;
  }
  .car-cell-m .l { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; font-weight: 500; }
  .car-cell-m .v { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  .car-cell-m .v.sm { font-size: 14px; }
  .car-cell-m .s { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .audit-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px;
  }
  .audit-cmn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px; position: relative;
  }
  .audit-cmn.ok { border-color: rgba(14,164,113,0.25); background: linear-gradient(180deg, #F4FBF7 0%, var(--surface) 60%); }
  .audit-cmn.bad { border-color: rgba(214,58,58,0.25); background: linear-gradient(180deg, #FEF6F6 0%, var(--surface) 60%); }
  .audit-cmn .cmn-code { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .audit-cmn .cmn-name { font-size: 15px; font-weight: 600; margin-bottom: 6px; letter-spacing: -0.01em; }
  .audit-cmn .cmn-desc { font-size: 12px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }

  .subtab-bar {
    display: flex; gap: 4px; padding: 4px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 10px; margin-bottom: 16px;
    width: fit-content; max-width: 100%; overflow-x: auto;
  }
  .subtab-bar button {
    padding: 8px 16px; font-size: 13px; font-weight: 500;
    background: transparent; color: var(--muted); border: none; cursor: pointer;
    border-radius: 7px; white-space: nowrap;
  }
  .subtab-bar button:hover { color: var(--ink); }
  .subtab-bar button.active { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-sm); }

  .checkpoint {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 20px; margin-bottom: 8px;
    display: grid; grid-template-columns: 36px 1fr auto; gap: 14px; align-items: center;
  }
  .check-ico {
    width: 36px; height: 36px; border-radius: 10px;
    display: grid; place-items: center;
  }
  .check-ico.ok { background: var(--greenBg); color: var(--green); }
  .check-ico.bad { background: var(--redBg); color: var(--red); }
  .check-ico svg { width: 18px; height: 18px; }
  .check-body .num { font-family: var(--mono); font-size: 11px; color: var(--faint); margin-bottom: 2px; }
  .check-body .nm { font-size: 14px; font-weight: 500; margin-bottom: 2px; letter-spacing: -0.01em; }
  .check-body .desc { font-size: 12px; color: var(--muted); }

  /* Collapsible checkpoint accordion. <details>/<summary> based — clicking
     summary toggles open state; we save it in state.openCheckpoints so the
     re-render keeps it open. */
  .checkpoint-acc {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; margin-bottom: 8px; overflow: hidden;
    transition: border-color 120ms;
  }
  .checkpoint-acc[open] { border-color: var(--borderHi); box-shadow: var(--shadow-sm); }
  .checkpoint-acc summary {
    padding: 16px 20px;
    display: grid; grid-template-columns: 36px 1fr auto auto; gap: 14px;
    align-items: center; cursor: pointer; list-style: none;
    transition: background 120ms;
  }
  .checkpoint-acc summary::-webkit-details-marker { display: none; }
  .checkpoint-acc summary:hover { background: var(--surface2); }
  .check-toggle {
    font-size: 11px; font-weight: 500; color: var(--accent);
    padding: 4px 10px; border-radius: 999px; background: rgba(46,91,255,0.08);
    white-space: nowrap;
  }
  .checkpoint-acc[open] .check-toggle { background: var(--accent); color: white; }
  .check-detail {
    padding: 4px 20px 18px; border-top: 1px dashed var(--border);
    background: var(--surface2);
  }
  .check-detail-row { padding: 12px 0; }
  .check-detail-row + .check-detail-row { border-top: 1px dashed var(--border); }
  .check-detail-lbl {
    font-size: 11px; font-weight: 600; color: var(--faint);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px;
  }
  .check-detail-val { font-size: 13px; color: var(--ink2); line-height: 1.55; }
  .check-detail-val.ok { color: var(--ink); }
  .check-detail-val.bad { color: var(--red); font-weight: 500; }

  /* ========== MONITORING — critical alert callout ========== */
  .section-eyebrow {
    font-size: 11px; font-weight: 600; color: var(--faint);
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .section-sub {
    font-size: 13px; color: var(--muted); margin-top: 4px;
  }
  .monitor-summary-head {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding-bottom: 18px; border-bottom: 1px solid var(--border); margin-bottom: 18px;
  }
  .state-pill { text-align: right; }
  .crop-cards {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px; margin-bottom: 18px;
  }
  .crop-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px;
  }
  .crop-name { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
  .crop-ha { font-size: 13px; color: var(--muted); font-feature-settings: 'tnum'; }
  .monitor-meta {
    display: flex; gap: 24px; flex-wrap: wrap;
    font-size: 13px; color: var(--ink2);
  }
  .monitor-meta .lbl { color: var(--muted); margin-right: 4px; }
  .monitor-meta strong { font-weight: 600; color: var(--ink); }

  .critical-callout {
    background: var(--redBg); border: 1px solid rgba(214,58,58,0.22);
    border-left: 4px solid var(--red);
    border-radius: 12px; padding: 18px 22px; margin-bottom: 14px;
    display: flex; gap: 16px; align-items: flex-start;
  }
  .critical-callout.ok-callout {
    background: var(--greenBg); border-color: rgba(14,164,113,0.22);
    border-left-color: var(--green);
  }
  .critical-icon {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--red); color: white;
    display: grid; place-items: center; flex-shrink: 0;
  }
  .critical-icon.ok { background: var(--green); }
  .critical-icon svg { width: 24px; height: 24px; }
  .critical-body { flex: 1; }
  .critical-title {
    font-size: 16px; font-weight: 700; color: var(--red);
    letter-spacing: -0.01em; margin-bottom: 6px;
  }
  .critical-msg {
    font-size: 14px; color: var(--ink2); line-height: 1.55;
  }
  .critical-msg strong { color: var(--ink); font-weight: 600; }

  /* ========== LIVE-MONITORED predios (Sentinel-2) ========== */
  .live-row td:first-child { box-shadow: inset 3px 0 0 var(--accent); }
  .live-dot {
    display: inline-block; vertical-align: -1px;
    color: var(--accent); font-size: 11px; line-height: 1;
    margin-right: 2px;
  }
  .live-banner {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px; margin-top: 8px;
    background: linear-gradient(90deg, #EAF0FF 0%, #FAFBFC 100%);
    border: 1px solid #C5D4FF;
    border-radius: 999px;
    font-size: 11px; color: var(--accent);
    font-weight: 500;
  }
  .live-banner .ico { font-size: 13px; }
  .live-banner .meta {
    color: var(--muted); font-weight: 400;
    border-left: 1px solid var(--borderHi); padding-left: 8px; margin-left: 4px;
    font-family: var(--mono); font-size: 10px;
  }

  /* ========== HISTORIC monitoring tab ========== */
  /* Big score with threshold-tinted color, used in the head of the score
     evolution card. */
  .score-big {
    font-size: 32px; font-weight: 600; letter-spacing: -0.02em;
    font-family: var(--mono); line-height: 1;
  }
  .score-big.score-ok   { color: var(--green); }
  .score-big.score-warn { color: var(--amber); }
  .score-big.score-bad  { color: var(--red); }
  .score-big .score-unit {
    font-size: 14px; color: var(--muted); font-weight: 500;
    margin-left: 2px;
  }

  /* Vertical timeline. Spine on the left, marker dots, card content. */
  .event-timeline {
    list-style: none; padding: 0; margin: 0;
    position: relative;
  }
  .event-timeline::before {
    content: ''; position: absolute;
    top: 6px; bottom: 6px; left: 19px;
    width: 2px; background: var(--border);
    border-radius: 1px;
  }
  .evt {
    display: grid; grid-template-columns: 40px 1fr;
    gap: 14px; padding: 12px 0;
    position: relative;
  }
  .evt:not(:last-child) {
    border-bottom: 1px dashed var(--border);
  }
  .evt-marker {
    width: 40px; height: 40px; border-radius: 50%;
    display: grid; place-items: center;
    background: var(--surface); border: 2px solid var(--border);
    z-index: 1; flex-shrink: 0;
  }
  .evt-marker svg { width: 16px; height: 16px; }
  .evt-high   .evt-marker { background: var(--redBg);   border-color: var(--red);   color: var(--red); }
  .evt-medium .evt-marker { background: var(--amberBg); border-color: var(--amber); color: var(--amber); }
  .evt-low    .evt-marker { background: var(--greenBg); border-color: var(--green); color: var(--green); }
  .evt-info   .evt-marker { background: #EAF0FF;        border-color: var(--accent); color: var(--accent); }
  .evt-body { padding-top: 4px; min-width: 0; }
  .evt-head {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .evt-title {
    font-size: 14px; font-weight: 500; color: var(--ink);
    letter-spacing: -0.01em;
  }
  .evt-desc {
    font-size: 12px; color: var(--muted); line-height: 1.5;
    margin-bottom: 4px;
  }
  .evt-date {
    font-size: 11px; color: var(--faint);
    font-family: var(--mono); font-feature-settings: 'tnum';
  }

  /* ========== NDVI history cards (in CAR detail Monitoring sub-tab) ========== */
  .ndvi-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px; margin-bottom: 12px;
  }
  .ndvi-card:last-child { margin-bottom: 0; }
  .ndvi-card-head {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 10px;
  }
  .ndvi-card-title { font-size: 14px; font-weight: 500; color: var(--ink); }
  .ndvi-card-meta { font-size: 12px; color: var(--muted); margin-top: 3px; font-feature-settings: 'tnum'; }
  .ndvi-card-chart {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    margin-bottom: 10px;
  }
  .ndvi-legend {
    display: flex; gap: 16px; flex-wrap: wrap;
    font-size: 11px; color: var(--muted);
  }
  .ndvi-legend span { display: inline-flex; align-items: center; gap: 5px; }
  .ndvi-legend .sw { display: inline-block; width: 14px; height: 8px; border-radius: 2px; }

  /* ========== MONITOREO SEKURA — watchlist bar ========== */
  .watchlist-bar {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 12px 16px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px;
    margin-bottom: 14px;
  }
  .watchlist-lbl {
    font-size: 11px; font-weight: 600; color: var(--faint);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-right: 6px;
  }
  .watchlist-item {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px 6px 8px; border-radius: 999px;
    background: var(--surface2); border: 1px solid var(--border);
    cursor: pointer; transition: all 120ms;
    font-family: var(--sans); font-size: 12px;
  }
  .watchlist-item:hover { border-color: var(--borderHi); background: var(--surface); }
  .watchlist-item.active {
    background: var(--brand); color: white; border-color: var(--brand);
  }
  .watchlist-item .nm { font-weight: 500; }
  .watchlist-item.active .nm { color: white; }
  .watchlist-item .meta {
    font-size: 11px; color: var(--muted);
    font-feature-settings: 'tnum';
  }
  .watchlist-item.active .meta { color: rgba(255,255,255,0.75); }
  .watchlist-item .badge { padding: 2px; }

  /* ========== EMPTY ========== */
  .empty {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 72px 32px; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .empty-ico {
    width: 80px; height: 80px; border-radius: 20px;
    background: linear-gradient(135deg, #EAF0FF, #DCE6FF);
    color: var(--accent); display: grid; place-items: center;
  }
  .empty-ico svg { width: 36px; height: 36px; }
  .empty h2 { font-size: 20px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
  .empty p { color: var(--muted); margin: 0; max-width: 460px; line-height: 1.55; }
  .empty-actions { display: flex; gap: 8px; margin-top: 8px; }

  /* ========== MAP TALHOES ========== */
  .talhao-map {
    background: linear-gradient(135deg, #F4F7FB 0%, #EAEEF4 100%);
    border-radius: 12px; overflow: hidden; position: relative; min-height: 280px;
  }

  /* Spark bars */
  .spark-row {
    display: grid; grid-template-columns: 110px 1fr 56px;
    gap: 12px; align-items: center; padding: 8px 0;
    font-size: 12px;
  }
  .spark-row .lbl { color: var(--muted); }
  .spark-row .val { text-align: right; font-weight: 600; font-feature-settings: 'tnum'; }
  .spark-bar { height: 6px; background: var(--surface2); border-radius: 999px; overflow: hidden; }
  .spark-bar > span { display: block; height: 100%; border-radius: 999px; }

  /* Risk pill */
  .risk-pill {
    display: inline-flex; align-items: center; gap: 6px; padding: 2px 9px;
    border-radius: 999px; font-size: 11px; font-weight: 600; font-feature-settings: 'tnum';
  }
  .risk-pill.lo { background: var(--greenBg); color: var(--green); }
  .risk-pill.md { background: var(--amberBg); color: var(--amber); }
  .risk-pill.hi { background: var(--redBg); color: var(--red); }

  /* alerts */
  .alert-card {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 3px solid var(--red); border-radius: 8px;
    padding: 12px 14px; margin-bottom: 8px;
  }
  .alert-card.warn { border-left-color: var(--amber); }
  .alert-card.info { border-left-color: var(--violet); }
  .alert-card .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .alert-card .head .nm { font-weight: 500; font-size: 13px; }
  .alert-card .sub { font-size: 11px; color: var(--muted); font-family: var(--mono); }

  /* footer */
  .footer {
    padding: 12px 24px; border-top: 1px solid var(--border);
    background: var(--surface); display: flex; justify-content: space-between;
    font-size: 12px; color: var(--muted);
  }

  /* utilities */
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .mt-16 { margin-top: 16px; }
  .mb-16 { margin-bottom: 16px; }
  .mb-22 { margin-bottom: 22px; }

  /* ==========================================================================
     RESPONSIVE
     - ≥1024px (desktop): no visual changes vs current production.
     - 768–1023px (tablet): some 2-column collapses + sidebar becomes overlay.
     - <768px  (phone):    1-col KPIs, compact topbar, scroll country tabs.
     - <430px  (small):    extra trims (reserved for future).
     ========================================================================== */

  /* Hamburger + sidebar-close + scrim + mobile lang select are HIDDEN by default.
     We only show them when the responsive media query kicks in. */
  .hamburger {
    display: none;
    width: 36px; height: 36px;
    background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    place-items: center; cursor: pointer; color: var(--ink2);
    flex-shrink: 0;
  }
  .hamburger:hover { color: var(--ink); border-color: var(--borderHi); }
  .hamburger svg { width: 18px; height: 18px; }

  .sidebar-close {
    display: none;
    position: absolute; top: 10px; right: 10px;
    width: 32px; height: 32px;
    background: transparent; border: none; cursor: pointer;
    color: var(--muted); border-radius: 6px;
    place-items: center;
  }
  .sidebar-close:hover { background: var(--surface2); color: var(--ink); }
  .sidebar-close svg { width: 18px; height: 18px; }

  .scrim { display: none; }
  .lang-mobile { display: none; }

  /* Tablet & phone: turn sidebar into a slide-in overlay. */
  @media (max-width: 1023px) {
    /* Show mobile-only controls */
    .hamburger { display: grid; }
    .sidebar-close { display: grid; }

    /* Hide desktop language buttons; show native select picker on touch devices */
    .lang { display: none; }
    .lang-mobile {
      display: block;
      background: var(--surface2);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 10px; font-size: 12px; font-weight: 500;
      color: var(--ink2); cursor: pointer;
      font-family: var(--sans);
      -webkit-appearance: none; -moz-appearance: none; appearance: none;

      background-repeat: no-repeat;
      background-position: right 10px center;
      padding-right: 26px;
    }

    /* Hide user name on mobile, keep avatar-only */
    .user-chip {
      padding: 4px;
      background: transparent; border: none;
    }
    .user-chip:hover { border: none; }
    .user-chip .nm { display: none; }

    /* Topbar tightening (tablet ≤1023px): height 60px (36px logo + 12+12 padding) */
    .topbar {
      height: 60px;
      padding: 12px 12px;
      gap: 10px;
    }
    .topbar .right { gap: 8px; }
    .brand-name { font-size: 15px; }
    .brand-logo { height: 36px; }

    /* SIDEBAR: turn into overlay panel */
    .sidebar {
      position: fixed;
      top: 60px;            /* matches tablet topbar height */
      left: 0; bottom: 0;
      width: 280px; max-width: 82vw;
      transform: translateX(-100%);
      transition: transform 240ms cubic-bezier(0.32, 0.72, 0, 1);
      z-index: 100;
      box-shadow: 8px 0 32px rgba(15, 26, 46, 0.14);
      padding-top: 48px;   /* leave room for the close X button */
    }
    .sidebar.is-open { transform: translateX(0); }

    /* Scrim: dark overlay between main content and sidebar */
    .scrim {
      display: block;
      position: fixed;
      top: 60px;            /* match tablet topbar height */
      left: 0; right: 0; bottom: 0;
      background: rgba(15, 26, 46, 0.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity 240ms ease;
      z-index: 99;
    }
    .scrim.is-active { opacity: 1; pointer-events: auto; }

    /* When sidebar open, prevent body scroll behind it */
    body.is-locked { overflow: hidden; }

    /* COUNTRY TABS: horizontal scroll with right-edge fade */
    .country-tabs-wrap {
      position: relative;
      overflow: hidden;
    }
    .country-tabs {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      flex-wrap: nowrap;
      padding-right: 24px;  /* space for the fade gradient */
    }
    .country-tabs::-webkit-scrollbar { display: none; }
    .country-tab { flex-shrink: 0; }
    .country-tabs-wrap::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 32px;
      background: linear-gradient(to left, var(--surface), rgba(255, 255, 255, 0));
      pointer-events: none;
    }

    /* MAIN CONTENT: edge padding tighter on mobile */
    .container { padding: 16px 14px; max-width: 100%; }
    .page-head { gap: 10px; margin-bottom: 16px; }
    .page-head h1 { font-size: 20px; }

    /* GRIDS: 2col layouts collapse to 1col earlier */
    .grid-2 { grid-template-columns: 1fr; gap: 12px; }
    .car-grid { grid-template-columns: repeat(2, 1fr); }
    .audit-grid { grid-template-columns: 1fr; }

    /* KPIs: 2 columns on tablet, will collapse to 1 below */
    .kpis { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .kpi { padding: 14px 16px; min-height: 0; }
    .kpi .val { font-size: 24px; }

    /* Cards: keep edge padding sensible */
    .card-head { padding: 14px 16px; }
    .card-body { padding: 16px; }

    /* TABLES: horizontal scroll inside the card, body never scrolls horizontally */
    .card .scroll-x,
    table.t {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    table.t { min-width: 560px; }  /* let table breathe horizontally */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    /* Map + legend: stack legend below on tablet */
    .map-wrap { grid-template-columns: 1fr; min-height: 0; }
    .map-stage { min-height: 360px; }
    .legend { align-self: stretch; }

    /* Critical callout: less padding */
    .critical-callout { padding: 14px 16px; gap: 12px; }

    /* CAR detail head: stack actions below */
    .car-head-top { flex-direction: column; align-items: flex-start; gap: 12px; }
    .car-head-top .actions { width: 100%; flex-wrap: wrap; }
    .car-head-top .actions .btn { flex: 1; justify-content: center; }
    .car-grid { gap: 8px; }

    /* Notification dropdown: not wider than viewport */
    .notif-dropdown {
      width: calc(100vw - 24px);
      max-width: 380px;
      right: -8px;
    }
  }

  /* Phone-specific: 1-column KPIs, smaller paddings, full-width number cards */
  @media (max-width: 767px) {
    .kpis { grid-template-columns: 1fr; }
    .car-grid { grid-template-columns: 1fr 1fr; }
    .kpi .val { font-size: 26px; }  /* a touch larger now that they have space */
    .country-tab { padding: 8px 12px; font-size: 12px; }
    .country-tab .nm { font-size: 13px; }

    /* Phone topbar: 56px height (32px logo + 12+12 padding) */
    .topbar { height: 56px; }
    .brand-logo { height: 32px; }
    /* Sidebar overlay + scrim must match the new topbar height */
    .sidebar { top: 56px; }
    .scrim   { top: 56px; }
  }

  /* Print laudo (separate window): unchanged */
  @media print {
    .hamburger, .sidebar-close, .scrim { display: none !important; }
  }

  /* Legacy desktop breakpoint kept untouched */
  @media (max-width: 1100px) and (min-width: 1024px) {
    .kpis { grid-template-columns: repeat(2, 1fr); }
    .grid-2 { grid-template-columns: 1fr; }
    .car-grid { grid-template-columns: repeat(3, 1fr); }
    .audit-grid { grid-template-columns: 1fr; }
  }

// computeStats(props) — derives counts/totals from a predios dataset.
// Called by setCountry() each time the user switches country.
function computeStats(props) {
  const totalCars = props.length;
  const totalHa = props.reduce((s, p) => s + p.ha, 0);
  const breachCount = props.filter(p => p.status === 'breach').length;
  const watchCount = props.filter(p => p.status === 'watch').length;
  const okCount = props.filter(p => p.status === 'ok').length;
  const breachHa = props.filter(p => p.status === 'breach').reduce((s, p) => s + p.ha, 0);
  const byRegion = {};
  for (const p of props) {
    if (!byRegion[p.region]) byRegion[p.region] = { cars: 0, ha: 0 };
    byRegion[p.region].cars += 1;
    byRegion[p.region].ha += p.ha;
  }
  for (const id in byRegion) byRegion[id].pct = totalCars ? (byRegion[id].cars / totalCars) * 100 : 0;
  const byUf = {};
  for (const p of props) {
    if (!byUf[p.uf]) byUf[p.uf] = { cars: 0, ha: 0, region: p.region };
    byUf[p.uf].cars += 1;
    byUf[p.uf].ha += p.ha;
  }
  return { totalCars, totalHa, breachCount, watchCount, okCount, breachHa, byRegion, byUf };
}

function hydrateRegions(regions, stats) {
  for (const r of regions) {
    const s = stats.byRegion[r.id] || { cars: 0, pct: 0, ha: 0 };
    r.cars = s.cars; r.pct = s.pct; r.ha = s.ha;
  }
}

// Country bundle: each entry has its own predios, regions, map, default lang,
// and the column header label for the rural unit (CAR / RENSPA / CDA).
// `displayTotal` is the headline KPI value the dashboard advertises to
// stakeholders — actual data is the 150-row sample, but the visible portfolio
// pretends to be larger (closer to a real bank/insurer book).
const DATASETS = {
  BR: { props: PROPS_BR, regions: REGIONS_BR, map: MAP_BR, lang: 'pt', displayTotal: 1675 },
  AR: { props: PROPS_AR, regions: REGIONS_AR, map: MAP_AR, lang: 'es', displayTotal: 432 },
  PY: { props: PROPS_PY, regions: REGIONS_PY, map: MAP_PY, lang: 'es', displayTotal: 289 },
};

const COUNTRY_LABELS = {
  BR: { id: 'CAR',    muni: { pt: 'Município',    es: 'Município',    en: 'Municipality' }, uf: { pt: 'UF',           es: 'UF',          en: 'State' },      flag: '🇧🇷' },
  AR: { id: 'RENSPA', muni: { pt: 'Partido',      es: 'Partido',      en: 'District' },      uf: { pt: 'Província',   es: 'Provincia',   en: 'Province' },  flag: '🇦🇷' },
  PY: { id: 'CDA',    muni: { pt: 'Distrito',     es: 'Distrito',     en: 'District' },      uf: { pt: 'Departamento', es: 'Departamento', en: 'Department' }, flag: '🇵🇾' },
};

// Mutable globals: rebuilt by setCountry() on every country switch.
// All render code keeps reading these names — only the values change.
let PROPS = null, REGIONS = null, MAP_DATA = null, STATS = null;

function setCountry(c) {
  if (!DATASETS[c]) return;
  state.country = c;
  PROPS = DATASETS[c].props;
  REGIONS = DATASETS[c].regions;
  MAP_DATA = DATASETS[c].map;
  STATS = computeStats(PROPS);
  hydrateRegions(REGIONS, STATS);
  // Switch UI language to country default (PT for BR, ES for AR/PY).
  state.lang = DATASETS[c].lang;
  // Reset to the panel landing — clicking a country tab from inside CAR
  // detail or scanner should always drop you back at the country overview.
  state.module = 'panel';
  state.scannerView = 'input';
  state.scannerCar = null;
  state.scannerEntity = null;
  state.scannerInput = '';
  state.scannerLoading = false;
  state.scannerTab = 'CAR';
  state.carSubtab = 'audit';
  state.lastConsultedCar = null;
  // Reset filters — IDs aren't comparable across countries.
  state.filterRegion = 'all';
  state.filterUf = null;
  state.filterStatus = 'all';
  state.page = 1;
}

// Country-aware label getter: returns the right unit name + UF/muni terms.
function L() {
  const lang = state.lang;
  const c = COUNTRY_LABELS[state.country];
  return { id: c.id, muni: c.muni[lang] || c.muni.es, uf: c.uf[lang] || c.uf.es, flag: c.flag };
}

// Resolve an i18n value: returns the string for the active lang. If the input
// is already a plain string (legacy data), returns it as-is.
function tr(v) {
  if (v == null) return '';
  if (typeof v === 'string') return v;
  return v[state.lang] || v.es || v.pt || v.en || '';
}

// Swap "CAR" / "CARs" tokens in rendered HTML to the country's unit name
// (RENSPA / CDA). We only touch text content (between > and <) so attribute
// values like data-tab="CAR" and JS identifiers stay untouched. Substrings
// like "SICAR" or "CAR-cross" are preserved by the \b word boundary.
function localize(html) {
  if (state.country === 'BR') return html;
  const id = COUNTRY_LABELS[state.country].id;
  return html.replace(/>([^<]*)</g, (_, content) =>
    '>' + content.replace(/\bCARs\b/g, id + 's').replace(/\bCAR\b/g, id) + '<'
  );
}

// Returns CAR detail for a given CAR code. If hand-curated detail exists in
// CAR_DETAIL, return it. Otherwise generate a deterministic stub from the
// PROPS row + hash of the CAR code, so re-opening the same CAR shows the
// same detail and demos behave consistently.
function getCARDetail(carId) {
  if (CAR_DETAIL[carId]) return CAR_DETAIL[carId];
  const p = PROPS.find(x => x.car === carId);
  if (!p) return CAR_DETAIL['MT-5108402-B4F12C2614C7794E50A4B8D331EE7702'];

  // Deterministic PRNG seeded by the CAR hash suffix.
  let seed = 0;
  for (let i = 0; i < carId.length; i++) seed = (seed * 31 + carId.charCodeAt(i)) >>> 0;
  const rng = () => {
    seed = (seed + 0x6D2B79F5) >>> 0;
    let t = seed;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
  const pick = (arr) => arr[Math.floor(rng() * arr.length)];

  // Audit status follows portfolio status.
  const audit = (() => {
    if (p.status === 'ok')     return { cmn5193: 'ok',  cmn5267: 'ok',  cmn4902: 'ok' };
    if (p.status === 'watch')  return { cmn5193: 'ok',  cmn5267: rng() < 0.5 ? 'bad' : 'ok', cmn4902: 'ok' };
    return { cmn5193: rng() < 0.4 ? 'bad' : 'ok', cmn5267: 'bad', cmn4902: rng() < 0.3 ? 'bad' : 'ok' };
  })();

  // Six standard checkpoints. Each name/desc is multilingual (PT/ES/EN).
  // `details` describes WHAT was checked (always shown when expanded), so the
  // analyst can see the verification logic regardless of result.
  const tad = `${2024 + Math.floor(rng()*3)}/${(Math.floor(rng()*9000)+1000)}`;
  const tadHa = (rng()*0.8 + 0.1).toFixed(1);
  const prodesHa = (rng()*4+0.5).toFixed(1);
  const prodesYear = 2024 + Math.floor(rng()*2);
  const cpDefs = [
    { num: '1', mcr: 'MCR 2-1-1',
      name:    { pt: 'Situação registral',                es: 'Situación registral',                en: 'Registry status' },
      okDesc:  { pt: 'Registro vigente. Sem pendências cartoriais.', es: 'Registro vigente. Sin pendencias registrales.', en: 'Active registry. No pending claims.' },
      desc:    { pt: 'Pendência cartorial em averbação de área.',    es: 'Pendencia registral en anotación de área.',     en: 'Registry pending area annotation.' },
      details: { pt: 'Verificação contra registro de imóveis estadual: matrícula, certidão de ônus, averbações.', es: 'Verificación contra registro de inmuebles provincial: matrícula, certificado de gravámenes, anotaciones.', en: 'Cross-checked against state property registry: title, liens, annotations.' } },
    { num: '2', mcr: 'MCR 2-1-3',
      name:    { pt: 'Impedimentos socioambientais',     es: 'Impedimentos socioambientales',       en: 'Social/environmental constraints' },
      okDesc:  { pt: 'Sem ocorrências de trabalho análogo à escravidão.', es: 'Sin ocurrencias de trabajo análogo a la esclavitud.', en: 'No forced-labor incidents.' },
      desc:    { pt: 'Ocorrência reportada nos últimos 24 meses — aguarda verificação.', es: 'Ocurrencia reportada en los últimos 24 meses — pendiente verificación.', en: 'Incident reported in last 24 months — pending verification.' },
      details: { pt: 'Cruzamento com Lista Suja do MTE, IBAMA, MPT e cadastros indígenas/quilombolas.', es: 'Cruce con listas oficiales de trabajo forzoso, fiscalía ambiental y catastros de pueblos originarios.', en: 'Cross-checked against forced-labor lists, environmental prosecution, indigenous registries.' } },
    { num: '3', mcr: 'MCR 2-1-4',
      name:    { pt: 'Embargos ambientais IBAMA',        es: 'Embargos ambientales',                en: 'Environmental embargoes' },
      okDesc:  { pt: 'Sem embargos ativos.',              es: 'Sin embargos activos.',              en: 'No active embargoes.' },
      desc:    { pt: `Embargo ativo TAD-${tad}. Sobrepõe ${tadHa} ha do polígono.`, es: `Embargo activo TAD-${tad}. Solapa ${tadHa} ha del polígono.`, en: `Active embargo TAD-${tad}. Overlaps ${tadHa} ha of the polygon.` },
      details: { pt: 'Polígono cruzado com base de embargos do IBAMA atualizada diariamente.', es: 'Polígono cruzado con base de embargos ambientales actualizada diariamente.', en: 'Polygon cross-checked against environmental embargo database (daily refresh).' } },
    { num: '4', mcr: 'MCR 2-1-5',
      name:    { pt: 'Desmatamento PRODES/MapBiomas',    es: 'Deforestación PRODES/MapBiomas',     en: 'Deforestation PRODES/MapBiomas' },
      okDesc:  { pt: 'Sem detecções de corte raso desde 2008. NDVI estável.', es: 'Sin detecciones de tala desde 2008. NDVI estable.', en: 'No clear-cut detections since 2008. NDVI stable.' },
      desc:    { pt: `Detecção PRODES de ${prodesHa} ha em ${prodesYear}.`,   es: `Detección PRODES de ${prodesHa} ha en ${prodesYear}.`, en: `PRODES detection of ${prodesHa} ha in ${prodesYear}.` },
      details: { pt: 'Comparação anual de máscara de cobertura PRODES + MapBiomas + análise NDVI multitemporal.', es: 'Comparación anual de máscara de cobertura PRODES + MapBiomas + análisis NDVI multitemporal.', en: 'Annual PRODES + MapBiomas cover mask comparison plus multi-temporal NDVI analysis.' } },
    { num: '5', mcr: 'MCR 2-1-6',
      name:    { pt: 'Sensoriamento remoto Sentinel-2',  es: 'Teledetección Sentinel-2',           en: 'Remote sensing Sentinel-2' },
      okDesc:  { pt: 'Cobertura 100%. Última varredura 2026-05-02.', es: 'Cobertura 100%. Último barrido 2026-05-02.', en: 'Full coverage. Last sweep 2026-05-02.' },
      desc:    { pt: 'Cobertura parcial — última varredura há 18 dias.', es: 'Cobertura parcial — último barrido hace 18 días.', en: 'Partial coverage — last sweep 18 days ago.' },
      details: { pt: 'Imagens Sentinel-2 a cada 5 dias com cobertura nuvem <20%, processadas via Google Earth Engine.', es: 'Imágenes Sentinel-2 cada 5 días con cobertura nubosa <20%, procesadas vía Google Earth Engine.', en: 'Sentinel-2 imagery every 5 days, <20% cloud cover, processed on Google Earth Engine.' } },
    { num: '6', mcr: 'MCR 16-9',
      name:    { pt: 'Requisitos PROAGRO',               es: 'Requisitos seguro agrícola',          en: 'Crop insurance requirements' },
      okDesc:  { pt: 'Documentação seguro safra completa. CCIR válido.', es: 'Documentación de cosecha completa. CCIR vigente.', en: 'Crop insurance docs complete. Cadastral certificate valid.' },
      desc:    { pt: 'CCIR vencido. Renovação pendente.', es: 'CCIR vencido. Renovación pendiente.', en: 'Cadastral certificate expired. Renewal pending.' },
      details: { pt: 'Validação de CCIR + documentação de seguro safra + adimplência crediária.', es: 'Validación de certificado catastral + documentación de seguro de cosecha + cumplimiento crediticio.', en: 'Cadastral certificate + crop insurance docs + credit compliance check.' } },
  ];
  // Number of breached checkpoints follows status.
  const breachCount = p.status === 'ok' ? 0 : (p.status === 'watch' ? 1 : (1 + Math.floor(rng() * 2)));
  const breachIdx = new Set();
  while (breachIdx.size < breachCount) breachIdx.add(Math.floor(rng() * cpDefs.length));
  const checkpoints = cpDefs.map((cp, i) => {
    const ok = !breachIdx.has(i);
    return { num: cp.num, name: cp.name, mcr: cp.mcr, ok,
             desc: ok ? cp.okDesc : cp.desc, details: cp.details };
  });

  // Geometries: ag area is the bulk; unproductive a small slice.
  const unprodPct = p.status === 'ok' ? rng() * 1.5 : rng() * 4 + 0.5;
  const agPct = +(100 - unprodPct).toFixed(1);
  const agHa = +(p.ha * agPct / 100).toFixed(2);
  const unprodHa = +(p.ha - agHa).toFixed(2);
  const geometries = [
    { tipo: 'consolidated', pct: agPct, ha: agHa },
    ...(unprodHa > 0.01 ? [{ tipo: 'unproductive', pct: +(100 - agPct).toFixed(1), ha: unprodHa }] : []),
  ];

  // Overlaps with neighboring CARs.
  const overlapCount = p.status === 'ok' ? 0 : (p.status === 'watch' ? (rng() < 0.5 ? 1 : 0) : (1 + Math.floor(rng() * 2)));
  const overlaps = Array.from({ length: overlapCount }, () => {
    const otherHash = Array.from({ length: 32 }, () => '0123456789ABCDEF'[Math.floor(rng() * 16)]).join('');
    const otherIbge = String(Math.floor(rng() * 9000000) + 1000000);
    return {
      car: `${p.uf}-${otherIbge}-${otherHash}`,
      muni: p.muni + ', ' + p.uf,
      ha: +(rng() * 4 + 0.2).toFixed(1),
      pct: +(rng() * 0.8 + 0.05).toFixed(2),
      status: p.status === 'breach' ? 'breach' : 'watch',
    };
  });

  // Crops: soja + maybe milho. Total ≈ ag area.
  const sojaShare = 0.4 + rng() * 0.5;
  const sojaHa = +(agHa * sojaShare).toFixed(1);
  const milhoHa = +(agHa - sojaHa).toFixed(1);
  const crops = [{ name: 'soja', ha: sojaHa, color: '#0EA471' }];
  if (milhoHa > 1) crops.push({ name: 'milho', ha: milhoHa, color: '#C77400' });

  // Active alert list.
  const alertCount = p.status === 'ok' ? 0 : (p.status === 'watch' ? 1 : (2 + Math.floor(rng() * 2)));
  const kinds = ['embargo', 'fire', 'overlap', 'deforestation'];
  const sats  = ['IBAMA', 'MODIS', 'CAR-cross', 'PRODES', 'Sentinel-2'];
  const alertList = Array.from({ length: alertCount }, (_, i) => {
    const kind = pick(kinds);
    const sev = p.status === 'breach' ? (i === 0 ? 'high' : pick(['medium', 'low'])) : 'low';
    return {
      id: 'A-' + String(2200 + Math.floor(rng() * 200)),
      kind,
      area: +(rng() * 2.5 + 0.1).toFixed(1),
      conf: 60 + Math.floor(rng() * 40),
      sat: pick(sats),
      date: '2026-04-' + String(15 + Math.floor(rng() * 15)).padStart(2, '0'),
      sev,
    };
  });
  const monitorVeg = p.status === 'ok' ? 100 : (p.status === 'watch' ? 95 + Math.floor(rng() * 5) : 88 + Math.floor(rng() * 8));

  // ====================================================================
  // ADDITIONS for Laudo Técnico (Sekura report)
  // All synthesized deterministically from carId so re-renders are stable.
  // ====================================================================

  // Compliance score 0-100 (inverse of risk).
  const complianceScore = Math.max(0, Math.min(100, 100 - p.risk));

  // Registry status (separate from operational compliance).
  const regStatus = p.status === 'breach'
    ? (rng() < 0.4 ? 'pendente' : 'ativo')
    : 'ativo';

  // ---- LIVE-MONITORED PREDIOS branch ----
  // If liveMonitored=true and the predio has an entry in LIVE_NDVI, build
  // lotes from real Sentinel-2 history. Otherwise synthesize. Either way
  // the rest of the function (BACEN flag, audit, geometries, etc.) runs
  // unchanged because it just reads `lotes`.
  const isLiveMonitored = !!(p.liveMonitored && typeof LIVE_NDVI !== 'undefined' && LIVE_NDVI[p.car]);
  const liveMeta = isLiveMonitored ? LIVE_NDVI[p.car] : null;

  let lotes = [];
  if (isLiveMonitored) {
    // Sample 12 evenly-spaced points from the 52-week history (every ~4 weeks),
    // ending with the most recent observation. The regional_ref is a SEPARATE
    // healthy-baseline curve per crop — comparing lote-vs-regional is what
    // surfaces real deviation. (Without it the deviation would always be ~5%
    // since the lote can't deviate from itself.)
    lotes = liveMeta.lotes.map((lo) => {
      const hist = lo.ndvi_history;
      const refHist = lo.regional_ref || lo.ndvi_history;
      const N = hist.length;
      const sampled = [], refCurve = [];
      for (let i = 0; i < 12; i++) {
        const idxInHist = Math.max(0, N - 1 - (11 - i) * 4);
        sampled.push(hist[idxInHist].ndvi);
        refCurve.push(refHist[idxInHist].ndvi);
      }
      const ndviCurrent = sampled[sampled.length - 1];
      const ndviRef     = refCurve[refCurve.length - 1];
      const deviation   = +(((ndviCurrent - ndviRef) / ndviRef) * 100).toFixed(1);
      const loteStatus = Math.abs(deviation) < 15 ? 'healthy'
                       : Math.abs(deviation) < 30 ? 'watch' : 'critical';
      return {
        id: lo.id, ha: lo.ha, crop: lo.crop,
        ndviCurrent: +ndviCurrent.toFixed(2), ndviRef: +ndviRef.toFixed(2),
        deviation, status: loteStatus,
        curve: sampled, refCurve,
      };
    });
  } else {
    // Synthesize lotes — original code path.
    const cropPool = ['soja', 'milho', 'pastagem', 'trigo', 'algodao'];
    const numLotes = 2 + Math.floor(rng() * 3); // 2..4
    let remainingHa = p.ha;
  for (let i = 0; i < numLotes; i++) {
    const isLast = i === numLotes - 1;
    const ha = isLast ? +remainingHa.toFixed(1)
                      : +(remainingHa * (0.3 + rng() * 0.4)).toFixed(1);
    remainingHa = +(remainingHa - ha).toFixed(1);
    if (ha < 1) continue;
    const crop = cropPool[Math.floor(rng() * cropPool.length)];
    // First lote of a breach predio carries the critical NDVI deviation.
    const isCritical = p.status === 'breach' && i === 0;
    const isWatch    = p.status === 'watch'  && i === 0;
    // Synthesize 12-month NDVI curve + regional reference per crop.
    const baseCurves = {
      soja:     [0.30, 0.40, 0.55, 0.70, 0.82, 0.85, 0.78, 0.55, 0.35, 0.30, 0.32, 0.42],
      milho:    [0.25, 0.35, 0.50, 0.65, 0.75, 0.80, 0.70, 0.50, 0.30, 0.28, 0.30, 0.38],
      pastagem: [0.50, 0.55, 0.62, 0.68, 0.72, 0.70, 0.65, 0.58, 0.52, 0.48, 0.50, 0.55],
      trigo:    [0.35, 0.45, 0.60, 0.75, 0.80, 0.65, 0.45, 0.30, 0.32, 0.40, 0.50, 0.55],
      algodao:  [0.30, 0.40, 0.55, 0.70, 0.78, 0.80, 0.70, 0.55, 0.40, 0.32, 0.35, 0.45],
    };
    const ref = baseCurves[crop] || baseCurves.soja;
    // Regional reference = the base curve, smoothed with tiny noise (±0.02).
    const refCurve = ref.map(v => +(v + (rng() - 0.5) * 0.04).toFixed(3));
    // Lote curve = base + noise; if critical, last 5 months pulled down hard.
    const loteCurve = ref.map((v, idx) => {
      const noise = (rng() - 0.5) * 0.06;
      let val = v + noise;
      if (isCritical && idx >= 7) {
        val *= (0.45 + rng() * 0.15); // 45-60% reduction
      } else if (isWatch && idx >= 9) {
        val *= (0.78 + rng() * 0.10); // mild
      }
      return +Math.max(0.05, val).toFixed(3);
    });
    const ndviCurrent = loteCurve[loteCurve.length - 1];
    const ndviRef     = refCurve[refCurve.length - 1];
    const deviation   = +(((ndviCurrent - ndviRef) / ndviRef) * 100).toFixed(1);
    const loteStatus = Math.abs(deviation) < 15 ? 'healthy'
                     : Math.abs(deviation) < 30 ? 'watch' : 'critical';
    lotes.push({
      id: 'L' + String(i + 1).padStart(2, '0'),
      ha, crop,
      ndviCurrent, ndviRef, deviation,
      status: loteStatus,
      curve: loteCurve, refCurve,
    });
    }  // end for-loop of synthesized lotes
  }    // end else (non-live) branch

  // BACEN flag: any lote with deviation > 30%.
  const maxDeviation = Math.max(0, ...lotes.map(l => Math.abs(l.deviation)));
  const bacenRequired = maxDeviation > 30;

  // PRODES deforestation history (0-2 entries for breach, 0 otherwise).
  const prodesHistory = [];

// SVG line chart for one lote: NDVI 12 months vs regional reference,
// with ±0.08 confidence band and red dots where deviation > 15%.
function renderNDVIChart(lote) {
  const w = 600, h = 200, padL = 44, padR = 16, padT = 16, padB = 32;
  const innerW = w - padL - padR;
  const innerH = h - padT - padB;
  const xAt = (i) => padL + (i / 11) * innerW;
  const yAt = (v) => padT + innerH - (v / 1.0) * innerH;

  // ±0.08 reference band → polygon: top edge then bottom edge reversed.
  const topPts    = lote.refCurve.map((v, i) => `${xAt(i).toFixed(1)},${yAt(Math.min(1, v + 0.08)).toFixed(1)}`).join(' ');
  const bottomPts = lote.refCurve.slice().reverse().map((v, idx) => {
    const i = 11 - idx;
    return `${xAt(i).toFixed(1)},${yAt(Math.max(0, v - 0.08)).toFixed(1)}`;
  }).join(' ');
  const band = `${topPts} ${bottomPts}`;

  const refPath  = lote.refCurve.map((v, i) => `${i === 0 ? 'M' : 'L'} ${xAt(i).toFixed(1)},${yAt(v).toFixed(1)}`).join(' ');
  const lotePath = lote.curve.map((v, i)    => `${i === 0 ? 'M' : 'L'} ${xAt(i).toFixed(1)},${yAt(v).toFixed(1)}`).join(' ');

  // Alert markers where |deviation| > 15%.
  const dots = lote.curve.map((v, i) => {
    const refV = lote.refCurve[i];
    const dev = ((v - refV) / refV) * 100;
    if (Math.abs(dev) <= 15) return '';
    return `<circle cx="${xAt(i).toFixed(1)}" cy="${yAt(v).toFixed(1)}" r="4" fill="#D63A3A" stroke="white" stroke-width="1.5"/>`;
  }).join('');

  const months   = ['M1','M2','M3','M4','M5','M6','M7','M8','M9','M10','M11','M12'];
  const xLabels  = months.map((m, i) => `<text x="${xAt(i).toFixed(1)}" y="${h - 10}" text-anchor="middle" font-size="9" fill="#5A6270">${m}</text>`).join('');
  const yTicks   = [0, 0.25, 0.5, 0.75, 1.0];
  const yLabels  = yTicks.map(v => `<text x="${padL - 6}" y="${(yAt(v) + 3).toFixed(1)}" text-anchor="end" font-size="9" fill="#5A6270">${v.toFixed(2)}</text>`).join('');
  const grid     = yTicks.slice(1).map(v => `<line x1="${padL}" y1="${yAt(v).toFixed(1)}" x2="${w - padR}" y2="${yAt(v).toFixed(1)}" stroke="#EAECEF" stroke-width="1"/>`).join('');

  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">
    ${grid}
    <polygon points="${band}" fill="#FFE4B5" opacity="0.45"/>
    <path d="${refPath}" fill="none" stroke="#C77400" stroke-width="2" stroke-dasharray="4 3"/>
    <path d="${lotePath}" fill="none" stroke="#D63A3A" stroke-width="2.5"/>
    ${dots}
    ${xLabels}
    ${yLabels}
  </svg>`;
}
